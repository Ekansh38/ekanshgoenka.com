{{ define "main" }}

<div class="four04">
  <canvas id="four04-life"></canvas>
  <canvas id="four04-canvas"></canvas>
  <div id="four04-glow"></div>
  <div class="four04-content">
    <p class="four04-num">404</p>
    <p class="four04-msg">this page doesn't exist.</p>
    <a href="/" class="four04-link">← back home</a>
  </div>
</div>

<style>
.four04 {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  overflow: hidden;
}
#four04-life {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  filter: blur(6px);
  opacity: 0.12;
}
#four04-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
#four04-glow {
  position: fixed;
  width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
  opacity: 0;
  pointer-events: none;
  filter: blur(60px);
  transform: translate(-50%, -50%);
  transition: opacity 0.3s;
  z-index: 0;
}
.four04-content {
  position: relative; z-index: 1;
  text-align: center;
  pointer-events: none;
}
.four04-num {
  font-size: clamp(6rem, 22vw, 14rem);
  font-weight: 700;
  color: var(--fg);
  opacity: 0.06;
  line-height: 1;
  margin: 0;
  letter-spacing: -0.02em;
}
.four04-msg {
  color: var(--muted);
  font-size: 0.9rem;
  margin: 12px 0 28px;
}
.four04-link {
  pointer-events: auto;
  color: var(--accent);
  font-size: 0.85rem;
  text-decoration: none;
  transition: opacity 0.2s;
}
.four04-link:hover { opacity: 0.7; }

body > header, body > footer { display: none; }
</style>

<script>
(function() {
  document.querySelector('header').style.display = 'none';
  var f = document.querySelector('footer'); if (f) f.style.display = 'none';

  var canvas = document.getElementById('four04-canvas');
  var lifeCanvas = document.getElementById('four04-life');
  var glow = document.getElementById('four04-glow');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W, H, dpr;

  // ── mouse glow ───────────────────────────────────────────────
  var mouse = { x: -9999, y: -9999 };

  function updateGlow() {
    if (mouse.x < -999) { glow.style.opacity = '0'; return; }
    glow.style.opacity = '0.08';
    glow.style.left = mouse.x + 'px';
    glow.style.top = mouse.y + 'px';
  }

  // ── life sim (background layer) ──────────────────────────────
  var CELL = 8;
  var lctx = lifeCanvas ? lifeCanvas.getContext('2d') : null;
  var GW, GH, grid, gridB;

  function initLife() {
    if (!lctx) return;
    var ldpr = window.devicePixelRatio || 1;
    var lw = lifeCanvas.offsetWidth;
    var lh = lifeCanvas.offsetHeight;
    lifeCanvas.width = lw * ldpr;
    lifeCanvas.height = lh * ldpr;
    lctx.setTransform(ldpr, 0, 0, ldpr, 0, 0);
    GW = Math.ceil(lw / CELL);
    GH = Math.ceil(lh / CELL);
    grid = new Uint8Array(GW * GH);
    gridB = new Uint8Array(GW * GH);
    // sparse random fill
    for (var i = 0; i < grid.length; i++) {
      grid[i] = Math.random() < 0.08 ? 1 : 0;
    }
  }

  function stepLife() {
    for (var y = 0; y < GH; y++) {
      for (var x = 0; x < GW; x++) {
        var n = 0;
        for (var dy = -1; dy <= 1; dy++) {
          for (var dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            var nx = (x + dx + GW) % GW;
            var ny = (y + dy + GH) % GH;
            n += grid[ny * GW + nx];
          }
        }
        var idx = y * GW + x;
        gridB[idx] = (grid[idx] && (n === 2 || n === 3)) || (!grid[idx] && n === 3) ? 1 : 0;
      }
    }
    var tmp = grid; grid = gridB; gridB = tmp;
    // autofill to prevent dying
    var alive = 0;
    for (var i = 0; i < grid.length; i++) alive += grid[i];
    if (alive < grid.length * 0.02) {
      for (var i = 0; i < grid.length * 0.03; i++) {
        grid[Math.floor(Math.random() * grid.length)] = 1;
      }
    }
  }

  function drawLife() {
    if (!lctx) return;
    var lw = lifeCanvas.offsetWidth;
    var lh = lifeCanvas.offsetHeight;
    lctx.clearRect(0, 0, lw, lh);
    lctx.fillStyle = getAccent();
    lctx.globalAlpha = 0.8;
    for (var y = 0; y < GH; y++) {
      for (var x = 0; x < GW; x++) {
        if (grid[y * GW + x]) {
          lctx.fillRect(x * CELL, y * CELL, CELL - 1, CELL - 1);
        }
      }
    }
    lctx.globalAlpha = 1;
  }

  // ── boids ────────────────────────────────────────────────────
  var _mobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
  var N = _mobile ? 50 : 160;
  var boids = [];

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W = canvas.offsetWidth;
    H = canvas.offsetHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    initLife();
  }

  function initBoids() {
    boids = [];
    for (var i = 0; i < N; i++) {
      var angle = Math.random() * Math.PI * 2;
      boids.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: Math.cos(angle) * 1.5,
        vy: Math.sin(angle) * 1.5
      });
    }
  }

  var SEP_R = 40, ALI_R = 70, COH_R = 120;
  var SEP_W = 0.15, ALI_W = 0.04, COH_W = 0.002;
  var MAX_V = 2.5, MOUSE_R = 160, MOUSE_W = 0.12;

  function step() {
    for (var i = 0; i < N; i++) {
      var b = boids[i];
      var sx = 0, sy = 0, ax = 0, ay = 0, cx = 0, cy = 0;
      var sc = 0, ac = 0, cc = 0;

      for (var j = 0; j < N; j++) {
        if (i === j) continue;
        var o = boids[j];
        var dx = o.x - b.x, dy = o.y - b.y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < SEP_R && d > 0) { sx -= dx / d; sy -= dy / d; sc++; }
        if (d < ALI_R) { ax += o.vx; ay += o.vy; ac++; }
        if (d < COH_R) { cx += o.x; cy += o.y; cc++; }
      }

      if (sc) { b.vx += sx / sc * SEP_W; b.vy += sy / sc * SEP_W; }
      if (ac) { b.vx += (ax / ac - b.vx) * ALI_W; b.vy += (ay / ac - b.vy) * ALI_W; }
      if (cc) { b.vx += (cx / cc - b.x) * COH_W; b.vy += (cy / cc - b.y) * COH_W; }

      // mouse attract
      var mdx = mouse.x - b.x, mdy = mouse.y - b.y;
      var md = Math.sqrt(mdx * mdx + mdy * mdy);
      if (md < MOUSE_R && md > 0) {
        b.vx += (mdx / md) * MOUSE_W;
        b.vy += (mdy / md) * MOUSE_W;
      }

      var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      if (spd > MAX_V) { b.vx = (b.vx / spd) * MAX_V; b.vy = (b.vy / spd) * MAX_V; }

      b.x += b.vx; b.y += b.vy;

      if (b.x < 0) b.x += W; if (b.x > W) b.x -= W;
      if (b.y < 0) b.y += H; if (b.y > H) b.y -= H;
    }
  }

  function getAccent() {
    return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#7aa2f7';
  }

  function drawBoids() {
    ctx.clearRect(0, 0, W, H);
    var accent = getAccent();

    // connections
    ctx.strokeStyle = accent;
    var CONN_R = 60;
    for (var i = 0; i < N; i++) {
      for (var j = i + 1; j < N; j++) {
        var dx = boids[i].x - boids[j].x;
        var dy = boids[i].y - boids[j].y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < CONN_R) {
          ctx.globalAlpha = (1 - d / CONN_R) * 0.12;
          ctx.beginPath();
          ctx.moveTo(boids[i].x, boids[i].y);
          ctx.lineTo(boids[j].x, boids[j].y);
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // dots
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = accent;
    for (var i = 0; i < N; i++) {
      ctx.beginPath();
      ctx.arc(boids[i].x, boids[i].y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ── main loop ────────────────────────────────────────────────
  var lifeFrame = 0;
  function loop() {
    step();
    drawBoids();
    // life ticks slower
    if (++lifeFrame % 6 === 0) {
      stepLife();
      drawLife();
    }
    updateGlow();
    requestAnimationFrame(loop);
  }

  resize();
  initBoids();
  drawLife();
  loop();

  window.addEventListener('resize', resize);
  canvas.addEventListener('mousemove', function(e) {
    var r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left;
    mouse.y = e.clientY - r.top;
  });
  canvas.addEventListener('mouseleave', function() { mouse.x = -9999; mouse.y = -9999; });
  canvas.addEventListener('touchmove', function(e) {
    var r = canvas.getBoundingClientRect();
    var t = e.touches[0];
    mouse.x = t.clientX - r.left;
    mouse.y = t.clientY - r.top;
  }, { passive: true });
  canvas.addEventListener('touchend', function() { mouse.x = -9999; mouse.y = -9999; });
})();
</script>

{{ end }}
