{{ define "main" }}

<a href="{{ .Parent.Permalink }}" class="back">← {{ strings.ToLower .Parent.Title }}</a>

<div class="project-title">{{ .Title }}</div>
<div class="project-meta">{{ .Date.Format "2006-01-02" }}{{ with .Params.status }} · {{ . }}{{ end }}</div>

{{ .Content }}

<div class="article-nav">
  {{ with .NextInSection }}<a href="{{ .Permalink }}" class="article-nav-prev">← {{ .Title }}</a>{{ end }}
  {{ with .PrevInSection }}<a href="{{ .Permalink }}" class="article-nav-next">{{ .Title }} →</a>{{ end }}
</div>

{{ end }}
