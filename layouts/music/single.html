{{ define "main" }}

<a href="/" class="back">← home</a>

<div class="project-title">{{ .Title }}</div>

<div class="project-meta">{{ .Params.tools }} · {{ .Params.year }} · {{ .Params.status }}</div>
{{ with .Params.cover }}
<img src="{{ . }}" alt="{{ $.Title }} cover" class="album-cover">
{{ end }}

{{ .Content }}

{{ with .Params.links }}
<div class="links">
  {{ range . }}
  <a href="{{ .url }}" target="_blank">{{ .label }} ↗</a>
  {{ end }}
</div>
{{ end }}

{{ end }}
