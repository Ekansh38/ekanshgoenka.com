<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/keymap/vim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/edit/closebrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/addon/display/autorefresh.min.js"></script>

<style>
  body { max-width: min(1200px, 96vw) !important; }

  /* ── custom Lua mode colors — exact match to source viewer ── */
  .cm-keyword    { color: var(--code-kw)   !important; }                         /* if then else end while for do return break repeat until */
  .cm-def        { color: var(--code-fn)   !important; }                         /* local function */
  .cm-atom       { color: var(--code-num)  !important; }                         /* true false nil */
  .cm-operator   { color: var(--code-op)   !important; }                         /* and or not + - == .. etc */
  .cm-string     { color: var(--code-str)  !important; }                         /* "..." */
  .cm-number     { color: var(--code-num)  !important; }                         /* 42 3.14 */
  .cm-comment    { color: var(--code-cmt)  !important; font-style: italic; }     /* -- comment */
  .cm-builtin    { color: var(--code-type) !important; }                         /* print tonumber type pairs ipairs */
  .cm-arcade     { color: var(--accent)    !important; }                         /* sleep clear colored color sound net */
  .cm-std        { color: var(--code-attr) !important; }                         /* math string table io os */
  .cm-callee     { color: var(--code-fn)   !important; }                         /* user-defined function calls */

  /* ── CodeMirror base overrides ── */
  .CodeMirror {
    background: var(--code-bg) !important;
    color: var(--fg) !important;
    font-family: inherit !important;
    font-size: 14px;
    height: 100%;
    border: none !important;
  }
  .CodeMirror-scroll { height: 100%; }
  .CodeMirror-gutters {
    background: var(--code-bg) !important;
    border-right: 1px solid var(--border) !important;
  }
  .CodeMirror-linenumber { color: var(--muted) !important; opacity: 0.7; }
  .CodeMirror-cursor { border-left: 2px solid var(--accent) !important; }
  .CodeMirror-secondarycursor { border-left: 1px solid var(--muted) !important; }
  .CodeMirror-selected,
  .CodeMirror-line::selection,
  .CodeMirror-line > span::selection,
  .CodeMirror-line > span > span::selection { background: rgba(122,162,247,0.22) !important; }
  .CodeMirror-focused .CodeMirror-selected  { background: rgba(122,162,247,0.25) !important; }
  .CodeMirror-activeline-background { background: rgba(127,127,127,0.055) !important; }
  .CodeMirror-matchingbracket { outline: 1px solid var(--accent) !important; color: inherit !important; }
  .CodeMirror-nonmatchingbracket { color: var(--code-err) !important; }
  /* vim command line */
  .CodeMirror-dialog {
    background: var(--code-bg) !important; color: var(--fg) !important;
    border-top: 1px solid var(--border) !important;
    font-family: inherit !important; font-size: 0.82rem; padding: 4px 10px;
  }
  .CodeMirror-dialog input {
    background: transparent !important; color: var(--fg) !important;
    font-family: inherit !important; border: none !important; outline: none !important;
  }

  /* ── layout ── */
  .ae-wrap {
    display: flex; flex-direction: column;
    border: 1px solid var(--border);
    height: calc(100vh - 120px);
    min-height: 520px;
    margin-top: 8px;
  }
  .ae-topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--code-bg);
    flex-shrink: 0;
  }
  .ae-back { color: var(--muted); font-size: 0.82rem; text-decoration: none; white-space: nowrap; }
  .ae-back:hover { color: var(--fg); }
  .ae-mode { font-size: 0.82rem; color: var(--muted); }
  .ae-mode strong { color: var(--accent); font-weight: 400; }
  .ae-topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .ae-charcount { font-size: 0.75rem; color: var(--muted); opacity: 0.6; }
  .ae-charcount.ae-char-warn { color: var(--code-num); opacity: 1; }
  .ae-charcount.ae-char-over { color: var(--code-err); opacity: 1; }
  .ae-vim-btn {
    font-family: inherit; font-size: 0.72rem;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 2px 8px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .ae-vim-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ae-vim-btn.ae-vim-on { border-color: var(--accent); color: var(--accent); }

  /* form area wraps metabars + editor + actions */
  #ae-form-area { display: flex; flex-direction: column; flex: 1; min-height: 0; }

  /* meta bars */
  .ae-metabar {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--code-bg);
    flex-shrink: 0; flex-wrap: wrap;
  }
  .ae-metabar input {
    background: transparent; border: none;
    border-bottom: 1px solid var(--border);
    color: var(--fg); font-family: inherit; font-size: 0.85rem;
    padding: 3px 6px; outline: none; min-width: 0;
  }
  .ae-metabar input:focus { border-bottom-color: var(--accent); }
  .ae-metabar input::placeholder { color: var(--muted); opacity: 0.6; }
  .ae-inp-title    { flex: 2; min-width: 140px; }
  .ae-inp-author   { flex: 1; min-width: 100px; }
  .ae-inp-desc     { flex: 3; min-width: 160px; }
  .ae-inp-editcode { flex: 1; min-width: 140px; }
  .ae-inp-upd      { flex: 2; min-width: 120px; }
  .ae-slug-preview { font-size: 0.72rem; color: var(--accent); opacity: 0.7; white-space: nowrap; }

  /* editor */
  .ae-editor-wrap { flex: 1; min-height: 0; overflow: hidden; background: var(--code-bg); }
  #ae-editor { height: 100%; }
  #ae-editor .CodeMirror { height: 100%; }

  /* ── tutorial overlay ── */
  #ae-tutorial {
    flex: 1; display: flex; flex-direction: column;
    background: var(--code-bg); overflow: hidden;
  }
  .ae-tut-slide {
    display: none; flex: 1; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 28px; overflow-y: auto;
  }
  .ae-tut-slide.ae-tut-active { display: flex; }

  /* step 0: experience check */
  .ae-tut-question {
    font-size: 1.1rem; color: var(--fg); margin-bottom: 32px;
    text-align: center; font-weight: 600;
  }
  .ae-tut-question small {
    display: block; font-size: 0.8rem; color: var(--muted);
    font-weight: 400; margin-top: 6px;
  }
  .ae-tut-choice-grid {
    display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
    max-width: 560px; width: 100%;
  }
  .ae-tut-choice {
    flex: 1; min-width: 200px; max-width: 250px;
    border: 1px solid var(--border); padding: 20px 18px;
    cursor: pointer; background: transparent;
    font-family: inherit; text-align: left;
    transition: border-color 0.15s, background 0.15s;
    color: var(--fg);
  }
  .ae-tut-choice:hover { border-color: var(--accent); background: rgba(122,162,247,0.04); }
  .ae-tut-choice-title { display: block; font-size: 0.92rem; font-weight: 600; margin-bottom: 6px; color: var(--accent); }
  .ae-tut-choice-desc  { display: block; font-size: 0.78rem; color: var(--muted); line-height: 1.5; }

  /* tutorial step layout */
  .ae-tut-body { max-width: 560px; width: 100%; }
  .ae-tut-dots {
    display: flex; gap: 6px; justify-content: center; margin-bottom: 24px;
  }
  .ae-tut-dot {
    width: 6px; height: 6px; border-radius: 0;
    background: var(--border); transition: background 0.2s;
  }
  .ae-tut-dot.ae-tut-dot-on { background: var(--accent); }
  .ae-tut-label {
    font-size: 0.68rem; color: var(--accent); letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .ae-tut-title {
    font-size: 1.1rem; font-weight: 700; color: var(--fg);
    margin-bottom: 12px;
  }
  .ae-tut-text {
    font-size: 0.85rem; color: var(--muted); line-height: 1.7;
    margin-bottom: 18px;
  }
  .ae-tut-text strong { color: var(--fg); font-weight: 600; }
  .ae-tut-code {
    background: var(--bg); border: 1px solid var(--border);
    padding: 12px 16px; font-size: 0.82rem; line-height: 1.7;
    margin-bottom: 14px; overflow-x: auto; white-space: pre;
    tab-size: 2;
  }
  .ae-tut-note {
    font-size: 0.78rem; color: var(--muted); line-height: 1.6;
    border-left: 2px solid var(--border); padding-left: 10px;
    margin-bottom: 18px;
  }
  .ae-tut-note strong { color: var(--accent); }
  .ae-tut-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 10px;
  }
  .ae-tut-nav-btn {
    font-family: inherit; font-size: 0.82rem; cursor: pointer;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 5px 14px;
    transition: border-color 0.15s, color 0.15s;
  }
  .ae-tut-nav-btn:hover { border-color: var(--fg); color: var(--fg); }
  .ae-tut-nav-btn.ae-tut-next {
    border-color: var(--accent); color: var(--accent);
    font-weight: 600;
  }
  .ae-tut-nav-btn.ae-tut-next:hover { background: var(--accent); color: var(--bg); }
  .ae-tut-skip {
    font-size: 0.75rem; color: var(--muted); cursor: pointer;
    background: none; border: none; font-family: inherit;
    text-decoration: underline; padding: 0; opacity: 0.6;
  }
  .ae-tut-skip:hover { opacity: 1; color: var(--fg); }

  /* starter picker grid */
  .ae-tut-pick-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px; width: 100%;
  }
  .ae-tut-pick-card {
    border: 1px solid var(--border); padding: 14px 16px;
    cursor: pointer; background: transparent; font-family: inherit;
    text-align: left; color: var(--fg);
    transition: border-color 0.15s, background 0.15s;
  }
  .ae-tut-pick-card:hover { border-color: var(--accent); background: rgba(122,162,247,0.04); }
  .ae-tut-pick-title { display: block; font-size: 0.88rem; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .ae-tut-pick-desc  { display: block; font-size: 0.75rem; color: var(--muted); line-height: 1.5; }

  /* actions bar */
  .ae-actions {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    background: var(--code-bg);
    flex-shrink: 0;
  }
  .ae-run-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--fg); font-family: inherit; font-size: 0.82rem;
    padding: 5px 14px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .ae-run-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ae-status { font-size: 0.82rem; }
  .ae-status-err { color: var(--code-err); }
  .ae-status-ok  { color: var(--accent); }
  .ae-spacer { flex: 1; }
  .ae-primary-btn {
    background: var(--accent); border: none;
    color: var(--bg); font-family: inherit; font-size: 0.82rem; font-weight: 700;
    padding: 5px 16px; cursor: pointer; transition: opacity 0.15s;
  }
  .ae-primary-btn:hover { opacity: 0.85; }
  .ae-primary-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── success panel (replaces form area after submit) ── */
  #ae-success-panel {
    flex: 1; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: var(--code-bg);
    padding: 40px 20px;
    text-align: center;
  }
  .ae-success-check {
    font-size: 2.4rem; color: var(--accent);
    margin-bottom: 10px;
  }
  .ae-success-title {
    font-size: 1.1rem; color: var(--fg);
    font-weight: 700; margin-bottom: 28px;
  }
  .ae-success-lbl {
    font-size: 0.78rem; color: var(--muted); letter-spacing: 0.06em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .ae-success-code-box {
    display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--accent);
    padding: 12px 20px;
    margin-bottom: 10px;
    background: var(--bg);
  }
  .ae-success-code {
    font-size: 1.5rem; color: var(--accent);
    letter-spacing: 0.12em; font-weight: 700;
  }
  .ae-success-warn {
    font-size: 0.78rem; color: var(--muted);
    max-width: 320px; margin: 0 auto 28px;
    line-height: 1.55;
  }
  .ae-success-warn strong { color: var(--fg); }
  .ae-success-btns {
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .ae-success-view {
    color: var(--accent); text-decoration: none; font-size: 0.85rem;
    border: 1px solid var(--accent); padding: 5px 14px;
  }
  .ae-success-view:hover { background: var(--accent); color: var(--bg); text-decoration: none; }
  .ae-success-another {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-family: inherit; font-size: 0.85rem;
    padding: 5px 14px; cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .ae-success-another:hover { border-color: var(--fg); color: var(--fg); }
</style>

<script>
(function() {
  // ── custom Lua mode: exact match to source viewer tokenizer ──
  CodeMirror.defineMode('lua-arcade', function() {
    var KW_CTL = /^(if|then|else|elseif|end|while|do|for|in|return|break|repeat|until)$/;
    var KW_DEF = /^(local|function)$/;
    var KW_VAL = /^(true|false|nil)$/;
    var KW_OP  = /^(and|or|not)$/;
    var FN_STD = /^(math|string|table|io|os|coroutine)$/;
    var FN_BLT = /^(print|tostring|tonumber|type|pairs|ipairs|pcall|xpcall|error|select|assert|next|rawget|rawset|setmetatable|getmetatable)$/;
    var FN_ARC = /^(sleep|clear|colored|color|sound|net)$/;

    return {
      startState: function() { return {}; },
      token: function(stream) {
        if (stream.eatSpace()) return null;

        // comment
        if (stream.match('--')) { stream.skipToEnd(); return 'comment'; }

        // string
        var ch = stream.peek();
        if (ch === '"' || ch === "'") {
          stream.next();
          var c;
          while ((c = stream.next()) != null) {
            if (c === '\\') { stream.next(); }
            else if (c === ch) { break; }
          }
          return 'string';
        }

        // hex number
        if (stream.match(/^0[xX][0-9a-fA-F]+/)) return 'number';
        // decimal / float
        if (stream.match(/^\d+\.?\d*(?:[eE][+-]?\d+)?/) || stream.match(/^\.\d+(?:[eE][+-]?\d+)?/)) return 'number';

        // identifiers & keywords
        if (stream.match(/^[a-zA-Z_]\w*/)) {
          var w = stream.current();
          var rest = stream.string.slice(stream.pos).replace(/^[ \t]*/, '');
          var isCall = rest.length > 0 && (rest[0] === '(' || rest[0] === '{' || rest[0] === '"' || rest[0] === "'");
          if (KW_CTL.test(w)) return 'keyword';
          if (KW_DEF.test(w)) return 'def';
          if (KW_VAL.test(w)) return 'atom';
          if (KW_OP.test(w))  return 'operator';
          if (FN_ARC.test(w)) return 'arcade';
          if (FN_STD.test(w)) return 'std';
          if (FN_BLT.test(w) && isCall) return 'builtin';
          if (isCall) return 'callee';
          return null;
        }

        // multi-char operators first
        if (stream.match(/^(~=|<=|>=|==|\.\.|\/\/)/)) return 'operator';
        // single-char operators
        if (stream.match(/^[+\-*\/%^#&|~<>=]/)) return 'operator';

        stream.next();
        return null;
      },
    };
  });
  CodeMirror.defineMIME('text/x-lua-arcade', 'lua-arcade');

  // ── define vim ex commands so :w :q :wq don't cause weirdness ──
  if (CodeMirror.Vim) {
    CodeMirror.Vim.defineEx('write',  'w',  function() { /* no-op */ });
    CodeMirror.Vim.defineEx('quit',   'q',  function() { window.location.href = '/arcade'; });
    CodeMirror.Vim.defineEx('wq',     'wq', function() { window.location.href = '/arcade'; });
    CodeMirror.Vim.defineEx('x',      'x',  function() { window.location.href = '/arcade'; });
    CodeMirror.Vim.defineEx('xit',    '',   function() { window.location.href = '/arcade'; });
  }

  var editor = CodeMirror(document.getElementById('ae-editor'), {
    value: 'print("hello!")\n',
    mode: 'lua-arcade',
    theme: 'default',
    lineNumbers: true,
    matchBrackets: true,
    autoCloseBrackets: true,
    autoRefresh: true,
    indentUnit: 2,
    tabSize: 2,
    indentWithTabs: false,
    extraKeys: {
      Tab: function(cm) {
        if (cm.somethingSelected()) { cm.indentSelection('add'); }
        else { cm.replaceSelection('  ', 'end'); }
      },
      'Shift-Tab': function(cm) { cm.indentSelection('subtract'); },
    },
  });

  // stop all key events in editor from reaching site-level handlers (e.g. [:] opening terminal)
  editor.getWrapperElement().addEventListener('keydown', function(e) { e.stopPropagation(); }, true);

  editor.on('change', updateCharCount);

  // prefill from snippet "open in editor"
  try {
    var prefill = sessionStorage.getItem('arcade_prefill_code');
    if (prefill) { sessionStorage.removeItem('arcade_prefill_code'); editor.setValue(prefill); }
  } catch(e) {}

  function getCode() { return editor.getValue(); }
  function setCode(v) { editor.setValue(v); }

  function updateCharCount() {
    var n = getCode().length;
    var el = document.getElementById('ae-charcount');
    el.textContent = n + ' / 25000';
    el.className = 'ae-charcount' + (n > 25000 ? ' ae-char-over' : n > 21250 ? ' ae-char-warn' : '');
  }

  function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,28)||''; }

  function setStatus(msg, type) {
    var el = document.getElementById('ae-status');
    el.textContent = msg;
    el.className = 'ae-status' + (type === 'err' ? ' ae-status-err' : type === 'ok' ? ' ae-status-ok' : '');
  }

  // ── vim toggle ──
  var vimOn = false;
  document.getElementById('ae-vim-btn').addEventListener('click', function() {
    vimOn = !vimOn;
    editor.setOption('keyMap', vimOn ? 'vim' : 'default');
    this.textContent = 'vim: ' + (vimOn ? 'on' : 'off');
    this.classList.toggle('ae-vim-on', vimOn);
    editor.focus();
  });

  // ── URL params → mode ──
  var params    = new URLSearchParams(window.location.search);
  var editId    = params.get('edit');
  var remixId   = params.get('remix');
  var modeEl    = document.getElementById('ae-mode');
  var submitBtn = document.getElementById('ae-submit');
  var updateBtn = document.getElementById('ae-update');

  if (editId) {
    modeEl.innerHTML = 'loading&hellip;';
    document.getElementById('ae-new-bar').style.display = 'none';
    document.getElementById('ae-edit-bar').style.display = 'flex';
    submitBtn.style.display = 'none';
    updateBtn.style.display = 'inline-block';

    fetch('/api/games?id=' + encodeURIComponent(editId))
      .then(function(r) { return r.json(); })
      .then(function(game) {
        if (game.error) { modeEl.textContent = 'game not found'; return; }
        modeEl.innerHTML = 'editing &nbsp;<strong>' + game.title + '</strong>';
        document.getElementById('ae-upd-title').placeholder = 'new title (currently: ' + game.title + ')';
        document.getElementById('ae-upd-desc').placeholder  = 'new description (currently: ' + (game.desc || 'none') + ')';
        setCode(game.code || '');
      })
      .catch(function() { modeEl.textContent = 'error loading game'; });

  } else if (remixId) {
    modeEl.textContent = 'remix';
    document.getElementById('ae-title').value = 'remix-' + remixId.slice(0, 20);
    fetch('/api/games?id=' + encodeURIComponent(remixId))
      .then(function(r) { return r.json(); })
      .then(function(game) { if (!game.error) setCode(game.code || ''); });

  } else {
    modeEl.textContent = 'new game';
  }

  // ── slug preview ──
  var titleInp = document.getElementById('ae-title');
  var slugEl   = document.getElementById('ae-slug');
  if (titleInp) {
    titleInp.addEventListener('input', function() {
      var s = slugify(this.value);
      if (s) { slugEl.textContent = 'id: ' + s; slugEl.style.display = 'inline'; }
      else { slugEl.style.display = 'none'; }
    });
  }

  // ── run ──
  document.getElementById('ae-run').addEventListener('click', function() {
    var code = getCode().trim();
    if (!code) { setStatus('write some code first', 'err'); return; }
    if (window.termRunLua) { window.termRunLua(code); setStatus('', ''); }
    else { setStatus('open [:] terminal first', 'err'); }
  });

  // ── show success panel ──
  function showSuccess(editCode, gameId) {
    document.getElementById('ae-form-area').style.display = 'none';
    var panel = document.getElementById('ae-success-panel');
    panel.style.display = 'flex';
    document.getElementById('ae-success-code').textContent = editCode;
    document.getElementById('ae-success-link').href        = '/arcade/game/?id=' + gameId;
    document.getElementById('ae-success-link').textContent = 'view game →';
  }

  // ── submit (new) ──
  submitBtn.addEventListener('click', function() {
    var title  = document.getElementById('ae-title').value.trim();
    var author = document.getElementById('ae-author').value.trim();
    var desc   = document.getElementById('ae-desc').value.trim();
    var code   = getCode().trim();
    var btn    = this;
    if (!title)  { setStatus('title required', 'err'); return; }
    if (!author) { setStatus('author required', 'err'); return; }
    if (!code)   { setStatus('write some code first', 'err'); return; }
    if (code.length > 25000) { setStatus('code too long (max 25000)', 'err'); return; }
    btn.disabled = true; btn.textContent = 'submitting…'; setStatus('', '');
    fetch('/api/games', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title, author: author, desc: desc, code: code }),
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.ok) {
        try { localStorage.removeItem('arcade_v1'); } catch(e) {}
        showSuccess(data.editCode, data.id);
      } else {
        setStatus(data.error || 'something went wrong', 'err');
        btn.disabled = false; btn.textContent = 'submit game →';
      }
    }).catch(function() {
      setStatus('network error', 'err');
      btn.disabled = false; btn.textContent = 'submit game →';
    });
  });

  // ── update (edit mode) ──
  updateBtn.addEventListener('click', function() {
    var code     = getCode().trim();
    var editCode = document.getElementById('ae-editcode').value.trim();
    var newTitle = document.getElementById('ae-upd-title').value.trim();
    var newDesc  = document.getElementById('ae-upd-desc').value.trim();
    var btn      = this;
    if (!editCode) { setStatus('enter your edit code', 'err'); return; }
    if (!code && !newTitle && newDesc === '') { setStatus('nothing to update', 'err'); return; }
    btn.disabled = true; btn.textContent = 'publishing…'; setStatus('', '');
    var payload = { code: editCode };
    if (code)     payload.newCode  = code;
    if (newTitle) payload.newTitle = newTitle;
    if (newDesc !== '') payload.newDesc = newDesc;
    fetch('/api/games?id=' + encodeURIComponent(editId), {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.ok) {
        try { localStorage.removeItem('arcade_v1'); } catch(e) {}
        setStatus('updated!', 'ok');
        btn.disabled = false; btn.textContent = 'publish update →';
        setTimeout(function() { window.location.href = '/arcade/game/?id=' + editId; }, 900);
      } else {
        setStatus(data.error || 'error', 'err');
        btn.disabled = false; btn.textContent = 'publish update →';
      }
    }).catch(function() {
      setStatus('network error', 'err');
      btn.disabled = false; btn.textContent = 'publish update →';
    });
  });

  // ── copy edit code ──
  document.getElementById('ae-success-copy').addEventListener('click', function() {
    var btn = this;
    navigator.clipboard.writeText(document.getElementById('ae-success-code').textContent).then(function() {
      btn.textContent = 'copied!'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1800);
    });
  });

  // ── submit another ──
  document.getElementById('ae-success-another').addEventListener('click', function() {
    document.getElementById('ae-success-panel').style.display = 'none';
    document.getElementById('ae-form-area').style.display = 'flex';
    setCode('print("hello!")\n');
    document.getElementById('ae-title').value  = '';
    document.getElementById('ae-desc').value   = '';
    document.getElementById('ae-slug').style.display = 'none';
    submitBtn.disabled = false; submitBtn.textContent = 'submit game →';
    setStatus('', '');
    editor.focus();
  });

  updateCharCount();

  // if tutorial not done and not expert, redirect (only for new game mode, not edit/remix)
  if (!editId && !remixId) {
    var pref = localStorage.getItem('arcade_intro');
    if (!pref) {
      var prefill = sessionStorage.getItem('arcade_prefill_code');
      if (!prefill) {
        window.location.replace('/arcade/tutorial/');
      }
    }
  }

  editor.focus();
})();
</script>
{{ end }}
