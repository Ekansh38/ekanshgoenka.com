{{ define "main" }}
<main class="themez-page">
  <h2>themez</h2>
  <p class="themez-sub">live preset previews. click to apply.</p>
  <div class="themez-grid" id="themez-grid"></div>
</main>

<style>
.themez-page { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
.themez-page h2 { margin: 0 0 4px; }
.themez-sub { color: var(--muted); font-size: 0.8rem; margin: 0 0 28px; }
.themez-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.tz-card {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.25s;
  border: 1px solid var(--border);
}
.tz-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
}
.tz-card:active { transform: scale(0.98) translateY(0); }
.tz-canvas {
  display: block;
  width: 100%;
  height: 180px;
}
.tz-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.tz-name {
  font-size: 0.82rem;
  font-weight: 700;
}
.tz-desc {
  font-size: 0.68rem;
  opacity: 0.6;
}
.tz-badge {
  font-size: 0.58rem;
  padding: 2px 7px;
  border-radius: 8px;
  opacity: 0.7;
}
@media (max-width: 700px) {
  .themez-grid { grid-template-columns: 1fr; }
  .tz-canvas { height: 150px; }
}
</style>

<script>
(function () {
  var THEMES = {
    'tokyo-night':      { bg:'#1a1b26', fg:'#a9b1d6', accent:'#7aa2f7', muted:'#565f89', border:'#292e42' },
    'gruvbox':          { bg:'#282828', fg:'#ebdbb2', accent:'#d79921', muted:'#928374', border:'#3c3836' },
    'dracula':          { bg:'#282a36', fg:'#f8f8f2', accent:'#bd93f9', muted:'#6272a4', border:'#44475a' },
    'rose-pine':        { bg:'#faf4ed', fg:'#575279', accent:'#b4637a', muted:'#9893a5', border:'#f2e9e1' },
    'github-light':     { bg:'#ffffff', fg:'#1f2328', accent:'#0969da', muted:'#656d76', border:'#d1d9e0' },
    'papercolor-light': { bg:'#eeeeee', fg:'#444444', accent:'#005f87', muted:'#878787', border:'#d0d0d0' },
    'hacker':           { bg:'#0a0a0a', fg:'#00ff41', accent:'#00ff41', muted:'#008020', border:'#003300' }
  };

  var PRESETS = {
    'default':  { sim:'combo', theme:'tokyo-night', desc:'site defaults',
      p:{'life.cell':7,'life.opacity':9,'life.glow':0,'life.autofill':50,'life.rainbow':0,
         'boids.n':120,'boids.size':14,'boids.opacity':14,'boids.glow':0,'boids.perception':80,'boids.separation':40} },
    ghost:      { sim:'combo', theme:'tokyo-night', desc:'any theme',
      p:{'life.cell':7,'life.opacity':9,'life.glow':0,'life.autofill':50,'life.rainbow':0,
         'boids.n':120,'boids.size':14,'boids.opacity':14,'boids.glow':0,'boids.perception':80,'boids.separation':40} },
    mist:       { sim:'life', theme:'tokyo-night', desc:'barely there',
      p:{'life.cell':8,'life.opacity':6,'life.glow':0,'life.autofill':40,'life.rainbow':0} },
    bloom:      { sim:'life', theme:'tokyo-night', desc:'glow + trail',
      p:{'life.cell':5,'life.opacity':70,'life.glow':80,'life.autofill':55,'life.rainbow':0} },
    ember:      { sim:'life', theme:'gruvbox', desc:'warm glow',
      p:{'life.cell':8,'life.opacity':35,'life.glow':55,'life.autofill':50,'life.rainbow':0} },
    chromatic:  { sim:'life', theme:'tokyo-night', desc:'rainbow',
      p:{'life.cell':6,'life.opacity':55,'life.glow':20,'life.autofill':50,'life.rainbow':1} },
    paper:      { sim:'life', theme:'papercolor-light', desc:'soft cells',
      p:{'life.cell':10,'life.opacity':20,'life.glow':0,'life.autofill':35,'life.rainbow':0} },
    flock:      { sim:'boids', theme:'tokyo-night', desc:'calm flock',
      p:{'boids.n':80,'boids.size':15,'boids.opacity':15,'boids.glow':0,'boids.perception':80,'boids.separation':40} },
    midnight:   { sim:'boids', theme:'tokyo-night', desc:'dark glow',
      p:{'boids.n':50,'boids.size':20,'boids.opacity':85,'boids.glow':70,'boids.perception':100,'boids.separation':60} },
    dusk:       { sim:'combo', theme:'dracula', desc:'purple glow + life',
      p:{'life.cell':7,'life.opacity':9,'life.glow':0,'life.autofill':50,'life.rainbow':0,
         'boids.n':40,'boids.size':28,'boids.opacity':75,'boids.glow':65,'boids.perception':120,'boids.separation':80} },
    soft:       { sim:'combo', theme:'rose-pine', desc:'gentle layers',
      p:{'life.cell':7,'life.opacity':30,'life.glow':20,'life.autofill':40,'life.rainbow':0,
         'boids.n':20,'boids.size':45,'boids.opacity':60,'boids.glow':30,'boids.perception':150,'boids.separation':100} },
    swarm:      { sim:'boids', theme:'gruvbox', desc:'fast dense',
      p:{'boids.n':300,'boids.size':6,'boids.opacity':22,'boids.glow':0,'boids.perception':60,'boids.separation':30} },
    prismatic:  { sim:'life', theme:'tokyo-night', desc:'position rainbow',
      p:{'life.cell':4,'life.opacity':80,'life.glow':50,'life.autofill':60,'life.rainbow':3} },
    aurora:     { sim:'combo', theme:'tokyo-night', desc:'rainbow + boids',
      p:{'life.cell':6,'life.opacity':50,'life.glow':25,'life.autofill':50,'life.rainbow':3,
         'boids.n':60,'boids.size':18,'boids.opacity':20,'boids.glow':15,'boids.perception':100,'boids.separation':50} },
    canvas:     { sim:'combo', theme:'github-light', desc:'light rainbow',
      p:{'life.cell':7,'life.opacity':30,'life.glow':20,'life.autofill':40,'life.rainbow':3,
         'boids.n':20,'boids.size':45,'boids.opacity':60,'boids.glow':30,'boids.perception':150,'boids.separation':100} }
  };

  /* ── helpers ── */
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  }
  function rgba(rgb, a) { return 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+a+')'; }

  /* hue rotation for rainbow modes */
  function hueShift(rgb, deg) {
    var r=rgb[0]/255, g=rgb[1]/255, b=rgb[2]/255;
    var max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
    var h=0, s=max?d/max:0, v=max;
    if(d){
      if(max===r) h=((g-b)/d+(g<b?6:0))/6;
      else if(max===g) h=((b-r)/d+2)/6;
      else h=((r-g)/d+4)/6;
    }
    h=(h+deg/360)%1; if(h<0)h+=1;
    var i=Math.floor(h*6), f=h*6-i, p=v*(1-s), q=v*(1-f*s), t=v*(1-(1-f)*s);
    var ro,go,bo;
    switch(i%6){
      case 0:ro=v;go=t;bo=p;break; case 1:ro=q;go=v;bo=p;break;
      case 2:ro=p;go=v;bo=t;break; case 3:ro=p;go=q;bo=v;break;
      case 4:ro=t;go=p;bo=v;break; case 5:ro=v;go=p;bo=q;break;
    }
    return [Math.round(ro*255),Math.round(go*255),Math.round(bo*255)];
  }

  /* ── mini life sim ── */
  function MiniLife(W, H, cell) {
    var GW = Math.ceil(W/cell), GH = Math.ceil(H/cell);
    var grid = new Uint8Array(GW*GH), gridB = new Uint8Array(GW*GH);
    for (var i=0;i<grid.length;i++) grid[i] = Math.random()<0.12?1:0;
    this.GW=GW; this.GH=GH; this.grid=grid; this.gridB=gridB; this.cell=cell;
    this.tick=0;
  }
  MiniLife.prototype.step = function() {
    var GW=this.GW, GH=this.GH, g=this.grid, b=this.gridB;
    for(var y=0;y<GH;y++) for(var x=0;x<GW;x++){
      var n=0;
      for(var dy=-1;dy<=1;dy++) for(var dx=-1;dx<=1;dx++){
        if(!dx&&!dy)continue;
        n+=g[((y+dy+GH)%GH)*GW+(x+dx+GW)%GW];
      }
      var i=y*GW+x;
      b[i]=(g[i]&&(n===2||n===3))||(!g[i]&&n===3)?1:0;
    }
    var tmp=this.grid; this.grid=this.gridB; this.gridB=tmp;
    var alive=0; for(var i=0;i<this.grid.length;i++) alive+=this.grid[i];
    if(alive<this.grid.length*0.03)
      for(var i=0;i<this.grid.length*0.04;i++) this.grid[Math.floor(Math.random()*this.grid.length)]=1;
    this.tick++;
  };
  MiniLife.prototype.draw = function(ctx,W,H,accentRgb,glow,opacity,rainbow) {
    var GW=this.GW,GH=this.GH,g=this.grid,c=this.cell;
    if(glow>0){ ctx.shadowColor=rgba(accentRgb,glow/100*0.8); ctx.shadowBlur=glow/100*20; }
    else { ctx.shadowColor='transparent'; ctx.shadowBlur=0; }
    for(var y=0;y<GH;y++) for(var x=0;x<GW;x++){
      if(!g[y*GW+x])continue;
      var col=accentRgb;
      if(rainbow===1) col=hueShift(accentRgb,(this.tick*3)%360);
      else if(rainbow===3) col=hueShift(accentRgb,(x/GW*360+y/GH*180)%360);
      ctx.fillStyle=rgba(col,opacity/100);
      ctx.fillRect(x*c,y*c,c-1,c-1);
    }
    ctx.shadowColor='transparent'; ctx.shadowBlur=0;
  };

  /* ── mini boids sim ── */
  function MiniBoids(W, H, n) {
    this.boids=[]; this.W=W; this.H=H;
    for(var i=0;i<n;i++){
      var a=Math.random()*Math.PI*2;
      this.boids.push({x:Math.random()*W,y:Math.random()*H,vx:Math.cos(a)*1.2,vy:Math.sin(a)*1.2});
    }
  }
  MiniBoids.prototype.step = function(perception, separation) {
    var bs=this.boids, N=bs.length, W=this.W, H=this.H;
    var SEP_R=separation||40, ALI_R=perception||80, COH_R=perception*1.3||100;
    for(var i=0;i<N;i++){
      var b=bs[i], sx=0,sy=0,ax=0,ay=0,cx=0,cy=0,sc=0,ac=0,cc=0;
      for(var j=0;j<N;j++){
        if(i===j)continue;
        var dx=bs[j].x-b.x, dy=bs[j].y-b.y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<SEP_R&&d>0){sx-=dx/d;sy-=dy/d;sc++;}
        if(d<ALI_R){ax+=bs[j].vx;ay+=bs[j].vy;ac++;}
        if(d<COH_R){cx+=bs[j].x;cy+=bs[j].y;cc++;}
      }
      if(sc){b.vx+=sx/sc*0.12;b.vy+=sy/sc*0.12;}
      if(ac){b.vx+=(ax/ac-b.vx)*0.04;b.vy+=(ay/ac-b.vy)*0.04;}
      if(cc){b.vx+=(cx/cc-b.x)*0.002;b.vy+=(cy/cc-b.y)*0.002;}
      var spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      if(spd>2.2){b.vx=b.vx/spd*2.2;b.vy=b.vy/spd*2.2;}
      b.x+=b.vx;b.y+=b.vy;
      if(b.x<0)b.x+=W;if(b.x>W)b.x-=W;
      if(b.y<0)b.y+=H;if(b.y>H)b.y-=H;
    }
  };
  MiniBoids.prototype.draw = function(ctx,accentRgb,opacity,glow) {
    var bs=this.boids, N=bs.length;
    if(glow>0){ ctx.shadowColor=rgba(accentRgb,glow/100*0.7); ctx.shadowBlur=glow/100*12; }
    ctx.fillStyle=rgba(accentRgb,opacity/100);
    for(var i=0;i<N;i++){
      ctx.beginPath(); ctx.arc(bs[i].x,bs[i].y,1.5,0,Math.PI*2); ctx.fill();
    }
    /* connections */
    ctx.strokeStyle=rgba(accentRgb,opacity/100*0.4);
    ctx.lineWidth=0.5;
    var CR=45;
    for(var i=0;i<N;i++) for(var j=i+1;j<N;j++){
      var dx=bs[i].x-bs[j].x,dy=bs[i].y-bs[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<CR){
        ctx.globalAlpha=(1-d/CR)*0.2;
        ctx.beginPath();ctx.moveTo(bs[i].x,bs[i].y);ctx.lineTo(bs[j].x,bs[j].y);ctx.stroke();
      }
    }
    ctx.globalAlpha=1;
    ctx.shadowColor='transparent'; ctx.shadowBlur=0;
  };

  /* ── build cards ── */
  var grid = document.getElementById('themez-grid');
  if (!grid) return;

  Object.keys(PRESETS).forEach(function(name) {
    var preset = PRESETS[name];
    var theme = THEMES[preset.theme] || THEMES['tokyo-night'];
    var p = preset.p;
    var accentRgb = hexToRgb(theme.accent);

    var card = document.createElement('div');
    card.className = 'tz-card';
    card.style.background = theme.bg;
    card.title = 'click to apply ' + name;

    var canvas = document.createElement('canvas');
    canvas.className = 'tz-canvas';
    card.appendChild(canvas);

    var info = document.createElement('div');
    info.className = 'tz-info';
    info.innerHTML = '<span class="tz-name" style="color:'+theme.fg+'">'+name+
      '</span><span class="tz-desc" style="color:'+theme.muted+'">'+preset.desc+
      '</span><span class="tz-badge" style="color:'+theme.accent+';border:1px solid '+theme.accent+'">'+preset.sim+'</span>';
    card.appendChild(info);

    card.addEventListener('click', function() {
      if (window.applyPreset) window.applyPreset(name);
    });

    grid.appendChild(card);

    /* init sim */
    var dpr = window.devicePixelRatio || 1;
    var W = canvas.offsetWidth, H = canvas.offsetHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);

    var life = null, boids = null;
    var showLife = preset.sim==='life'||preset.sim==='combo';
    var showBoids = preset.sim==='boids'||preset.sim==='combo';
    /* scale for small preview: clamp cell size, cap boid count */
    var previewCell = Math.max(3, Math.min(6, p['life.cell']||7));
    if (showLife) life = new MiniLife(W, H, previewCell);
    if (showBoids) {
      var bn = Math.min(p['boids.n']||60, 50);
      boids = new MiniBoids(W, H, bn);
    }

    /* warmup and render static snapshot */
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0,0,W,H);
    if (showLife) { for (var s=0;s<40;s++) life.step(); }
    if (showBoids) { for (var s=0;s<80;s++) boids.step(p['boids.perception']||80, p['boids.separation']||40); }
    if (showLife) life.draw(ctx,W,H,accentRgb,p['life.glow']||0,p['life.opacity']||9,p['life.rainbow']||0);
    if (showBoids) boids.draw(ctx,accentRgb,p['boids.opacity']||14,p['boids.glow']||0);
  });
})();
</script>
{{ end }}
