{{ define "main" }}
<style>
  .gb-intro { color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

  .gb-form {
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 36px;
  }
  .gb-field { margin-bottom: 10px; }
  .gb-field:last-of-type { margin-bottom: 0; }
  .gb-label { display: block; color: var(--muted); font-size: 0.78rem; margin-bottom: 4px; }
  .gb-input {
    width: 100%; background: var(--code-bg); border: 1px solid var(--border);
    color: var(--fg); font: inherit; font-size: 0.88rem;
    padding: 8px 10px; outline: none; box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .gb-input:focus { border-color: var(--accent); }
  textarea.gb-input { resize: vertical; min-height: 70px; }
  .gb-anon-hint { color: var(--muted); font-size: 0.75rem; margin-top: 3px; }
  .gb-form-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  #gb-submit {
    background: transparent; border: 1px solid var(--accent);
    color: var(--accent); font: inherit; font-size: 0.88rem;
    padding: 8px 20px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  #gb-submit:hover { background: var(--accent); color: var(--bg); }
  #gb-submit:disabled { opacity: 0.4; cursor: default; }
  #gb-status { font-size: 0.82rem; min-height: 1.2em; }
  #gb-identity-fields { display: none; }
  #gb-identity-fields.open { display: block; }

  .gb-entry {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
  }
  .gb-entry:first-child { border-top: 1px solid var(--border); }
  .gb-entry-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .gb-entry-who { display: flex; align-items: baseline; gap: 8px; }
  .gb-entry-name { font-weight: 700; font-size: 0.95rem; }
  .gb-entry-context { color: var(--muted); font-size: 0.78rem; }
  .gb-entry-date { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; }
  .gb-entry-msg {
    font-size: 0.92rem; line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
  }
  .gb-entry-actions { display: flex; align-items: center; gap: 8px; }
  .gb-del-btn {
    background: none; border: none; color: var(--muted); font: inherit;
    font-size: 0.7rem; cursor: pointer; padding: 0; opacity: 0.4;
    transition: opacity 0.15s, color 0.15s;
  }
  .gb-del-btn:hover { opacity: 1; color: #f7768e; }

  #gb-admin-toggle {
    background: none; border: none; color: var(--muted); font: inherit;
    font-size: 0.75rem; cursor: pointer; padding: 0; opacity: 0.25;
    transition: opacity 0.15s;
    display: none;
  }
  #gb-admin-toggle.visible { display: inline; }
  #gb-admin-toggle:hover { opacity: 0.6; }
  #gb-admin-bar { display: none; margin-bottom: 12px; }
  #gb-admin-bar.open { display: block; }
  #gb-admin-code {
    background: var(--code-bg); border: 1px solid var(--border);
    color: var(--fg); font: inherit; font-size: 0.82rem;
    padding: 5px 8px; width: 180px; outline: none;
  }
  .gb-count { color: var(--muted); font-size: 0.82rem; }
</style>

<div class="project-title">guestbook</div>
<p class="gb-intro">Leave a message! Say something nice or mean. You can optionally say who you are for people to know, or put in a funny name.</p>

<div class="gb-form">
  <div class="gb-field">
    <textarea id="gb-msg" class="gb-input" placeholder="write something..." maxlength="500" rows="3" spellcheck="false"></textarea>
  </div>

  <div id="gb-identity-fields">
    <div class="gb-field">
      <label class="gb-label">name</label>
      <input id="gb-name" class="gb-input" type="text" placeholder="anonymous" maxlength="50" autocomplete="off" spellcheck="false">
    </div>
    <div class="gb-field">
      <label class="gb-label">who are you? <span style="opacity:0.6">(optional, e.g. "teacher", "friend from school", "fellow dev")</span></label>
      <input id="gb-context" class="gb-input" type="text" placeholder="" maxlength="100" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <input id="gb-hp" type="text" tabindex="-1" autocomplete="off" style="display:none">

  <div class="gb-form-footer">
    <div>
      <button id="gb-submit">sign the guestbook</button>
      <div id="gb-status"></div>
    </div>
  </div>
</div>

<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
  <span class="gb-count" id="gb-count"></span>
  <button id="gb-admin-toggle">[mod]</button>
</div>
<div id="gb-admin-bar">
  <input id="gb-admin-code" type="password" placeholder="master code" autocomplete="off">
</div>

<div id="gb-entries">
  <p style="color:var(--muted)">loading...</p>
</div>

<script>
(function() {
  var API = '/api/guestbook';
  var _entries = null;

  function fmt(d) {
    if (!d) return '';
    var parts = d.split('T')[0].split('-');
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(parts[1],10)-1] + ' ' + parseInt(parts[2],10) + ', ' + parts[0];
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function getAdminCode() {
    return (document.getElementById('gb-admin-code') || {}).value || '';
  }

  function render(entries) {
    var el = document.getElementById('gb-entries');
    var countEl = document.getElementById('gb-count');
    var admin = getAdminCode().length > 0;

    countEl.textContent = entries.length ? entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies') : '';

    if (!entries.length) {
      el.innerHTML = '<p style="color:var(--muted)">no entries yet. be the first to sign.</p>';
      return;
    }
    el.innerHTML = entries.map(function(e) {
      var nameStr = esc(e.name || 'anonymous');
      return '<div class="gb-entry">'
        + '<div class="gb-entry-header">'
        + '<div class="gb-entry-who">'
        + '<span class="gb-entry-name">' + nameStr + '</span>'
        + (e.context ? '<span class="gb-entry-context">' + esc(e.context) + '</span>' : '')
        + '</div>'
        + '<div class="gb-entry-actions">'
        + '<span class="gb-entry-date">' + fmt(e.date) + '</span>'
        + (admin && e.id ? '<button class="gb-del-btn" data-id="' + esc(e.id) + '">del</button>' : '')
        + '</div>'
        + '</div>'
        + '<div class="gb-entry-msg">' + esc(e.message) + '</div>'
        + '</div>';
    }).join('');

    if (admin) {
      el.querySelectorAll('.gb-del-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var id = this.getAttribute('data-id');
          if (!id) return;
          this.textContent = '...';
          fetch(API, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id, code: getAdminCode() })
          }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.ok) { _entries = _entries.filter(function(e) { return e.id !== id; }); render(_entries); }
            else { btn.textContent = 'err'; }
          }).catch(function() { btn.textContent = 'err'; });
        });
      });
    }
  }

  function setStatus(msg, color) {
    var el = document.getElementById('gb-status');
    el.textContent = msg;
    el.style.color = color || 'var(--muted)';
  }

  function loadEntries() {
    fetch(API, { cache: 'no-store' }).then(function(r) { return r.json(); }).then(function(data) {
      _entries = data;
      render(data);
    }).catch(function() {
      document.getElementById('gb-entries').innerHTML = '<p style="color:var(--muted)">couldn\'t load entries.</p>';
    });
  }

  loadEntries();

  // show mod button only with ?mod param
  if (new URLSearchParams(window.location.search).has('mod')) {
    document.getElementById('gb-admin-toggle').classList.add('visible');
  }

  // admin toggle
  document.getElementById('gb-admin-toggle').addEventListener('click', function() {
    var bar = document.getElementById('gb-admin-bar');
    bar.classList.toggle('open');
    if (bar.classList.contains('open')) document.getElementById('gb-admin-code').focus();
  });
  document.getElementById('gb-admin-code').addEventListener('input', function() {
    if (_entries) render(_entries);
  });

  // submit: first click opens name fields, second click sends
  var idFields = document.getElementById('gb-identity-fields');
  var idRevealed = false;

  document.getElementById('gb-submit').addEventListener('click', function() {
    var message = document.getElementById('gb-msg').value.trim();
    if (!message) { setStatus('write something!'); return; }

    if (!idRevealed) {
      idRevealed = true;
      idFields.classList.add('open');
      document.getElementById('gb-name').focus();
      setStatus('add your name or just hit sign again to post anonymously.', 'var(--muted)');
      return;
    }

    var name    = document.getElementById('gb-name').value.trim();
    var context = document.getElementById('gb-context').value.trim();
    var hp      = document.getElementById('gb-hp').value;

    var btn = this;
    btn.disabled = true;
    btn.textContent = '...';
    setStatus('');

    fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, context: context, message: message, hp: hp })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { setStatus(data.error); return; }
      document.getElementById('gb-msg').value = '';
      document.getElementById('gb-name').value = '';
      document.getElementById('gb-context').value = '';
      setStatus('signed!', 'var(--accent)');
      _entries = [data].concat(_entries || []);
      render(_entries);
    })
    .catch(function() { setStatus('network error. try again.'); })
    .finally(function() { btn.disabled = false; btn.textContent = 'sign the guestbook'; });
  });
})();
</script>
{{ end }}
