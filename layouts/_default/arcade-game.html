{{ define "main" }}
<style>
  .ag-source-code .ag-line-active {
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    display: inline-block;
    width: 100%;
  }
  .ag-preview-panel {
    border: 1px solid var(--border);
    margin-top: 8px;
    background: var(--code-bg, #1a1b26);
  }
  .ag-preview-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 0.72rem;
    color: var(--muted);
  }
  .ag-preview-out {
    padding: 10px 14px;
    font-size: 0.82rem;
    line-height: 1.7;
    min-height: 40px;
    max-height: 200px;
    overflow-y: auto;
  }
</style>
<div class="arc-bg-dots" aria-hidden="true"></div>
<div class="ag-back"><a href="/arcade">← arcade</a></div>

<div id="ag-loading" class="ag-loading-state">loading<span class="arc-cursor">_</span></div>

<div id="ag-content" class="ag-content" style="display:none">

  <div class="ag-title-area">
    <h1 id="ag-title" class="ag-title"></h1>
    <p id="ag-desc" class="ag-desc" style="display:none"></p>
  </div>

  <div class="ag-meta-panel">
    <div class="ag-meta-item">
      <span class="ag-meta-lbl">author</span>
      <span id="ag-author" class="ag-meta-val"></span>
    </div>
    <div class="ag-meta-item">
      <span class="ag-meta-lbl">submitted</span>
      <span id="ag-date" class="ag-meta-val"></span>
    </div>
    <div class="ag-meta-item">
      <span class="ag-meta-lbl">id</span>
      <span id="ag-id" class="ag-meta-val ag-meta-val-muted"></span>
    </div>
    <div class="ag-meta-item">
      <span class="ag-meta-lbl">lines</span>
      <span id="ag-lines" class="ag-meta-val ag-meta-val-accent"></span>
    </div>
  </div>

  <div class="ag-actions">
    <button id="ag-play" class="ag-play-btn"><span class="ag-play-btn-inner">▶&nbsp; play in terminal</span></button>
    <button id="ag-remix" class="ag-action-btn">remix →</button>
  </div>

  <div class="ag-source-section">
    <div class="ag-source-header">
      <span class="ag-source-title">source</span>
      <button id="ag-preview" class="ag-copy-btn">▶ preview</button>
      <button id="ag-copy" class="ag-copy-btn">copy</button>
    </div>
    <div class="ag-source-window">
      <div class="ag-source-window-bar">
        <span class="ag-window-dot ag-dot-red"></span>
        <span class="ag-window-dot ag-dot-yellow"></span>
        <span class="ag-window-dot ag-dot-green"></span>
        <span class="ag-window-filename" id="ag-filename"></span>
      </div>
      <div class="ag-source-body">
        <div class="ag-line-nums" id="ag-line-nums"></div>
        <pre id="ag-source" class="ag-source-code"></pre>
      </div>
    </div>
    <div id="ag-preview-panel" class="ag-preview-panel" style="display:none">
      <div class="ag-preview-bar">
        <span>preview output</span>
        <button id="ag-preview-close" class="ag-copy-btn" style="font-size:0.68rem">close</button>
      </div>
      <div id="ag-preview-out" class="ag-preview-out"></div>
    </div>
  </div>

  <div class="ag-edit-link-row">
    <a id="ag-edit-link" href="#" class="ag-edit-link">edit in editor →</a>
  </div>

  <details class="ag-del-section">
    <summary class="ag-del-summary">delete this game</summary>
    <div class="ag-del-form">
      <input type="text" id="ag-code-inp" class="arc-code-inp" placeholder="edit code (xxxxx-xxxxx)">
      <button id="ag-del-confirm" class="arc-del-confirm">confirm delete</button>
      <span id="ag-del-status" class="arc-del-status"></span>
    </div>
  </details>

</div>

<div id="ag-error" class="ag-error" style="display:none">game not found.</div>

<script>
(function() {
  function hlEsc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function highlightLua(code) {
    var KW_CTL=/^(if|then|else|elseif|end|while|do|for|in|return|break|repeat|until)$/,KW_DEF=/^(local|function)$/,KW_VAL=/^(true|false|nil)$/,KW_OP=/^(and|or|not)$/,FN_STD=/^(math|string|table|io|os|coroutine)$/,FN_BLT=/^(print|tostring|tonumber|type|pairs|ipairs|pcall|xpcall|error|select|assert|next|rawget|rawset|setmetatable|getmetatable)$/,FN_ARC=/^(sleep|clear|colored|color|sound|net)$/,MOPS=['~=','<=','>=','==','..','//'];
    function tok(src){var out='',i=0;while(i<src.length){var c=src[i];if(c==='"'||c==="'"){var j=i+1;while(j<src.length){if(src[j]==='\\'){j+=2;}else if(src[j]===c){j++;break;}else j++;}out+='<span class="lh-str">'+hlEsc(src.slice(i,j))+'</span>';i=j;continue;}if(/[0-9]/.test(c)||(c==='.'&&/[0-9]/.test(src[i+1]||''))){var j=i;if(src[j]==='0'&&/[xX]/.test(src[j+1]||'')){j+=2;while(/[0-9a-fA-F]/.test(src[j]||''))j++;}else{while(/[0-9]/.test(src[j]||''))j++;if(src[j]==='.'){j++;while(/[0-9]/.test(src[j]||''))j++;}if(/[eE]/.test(src[j]||'')){j++;if(/[+-]/.test(src[j]||''))j++;while(/[0-9]/.test(src[j]||''))j++;}}out+='<span class="lh-num">'+hlEsc(src.slice(i,j))+'</span>';i=j;continue;}if(/[a-zA-Z_]/.test(c)){var j=i;while(/[a-zA-Z0-9_]/.test(src[j]||''))j++;var w=src.slice(i,j),rest=src.slice(j).replace(/^[ \t]*/,''),call=rest[0]==='('||rest[0]==='{'||rest[0]==='"'||rest[0]==="'";var cl=KW_CTL.test(w)?'lh-kw':KW_DEF.test(w)?'lh-kw2':KW_VAL.test(w)?'lh-val':KW_OP.test(w)?'lh-op':FN_ARC.test(w)?'lh-arcade':FN_STD.test(w)?'lh-std':(FN_BLT.test(w)&&call)?'lh-builtin':call?'lh-fn':null;out+=cl?'<span class="'+cl+'">'+hlEsc(w)+'</span>':hlEsc(w);i=j;continue;}if(/[+\-*\/%^#&|~<>=]/.test(c)){var m='';for(var o=0;o<MOPS.length;o++){if(src.slice(i,i+MOPS[o].length)===MOPS[o]){m=MOPS[o];break;}}if(!m)m=c;out+='<span class="lh-op">'+hlEsc(m)+'</span>';i+=m.length;continue;}out+=hlEsc(c);i++;}return out;}
    return code.split('\n').map(function(line){var comment='',ci=-1,inS=false,sq='';for(var k=0;k<line.length;k++){var ch=line[k];if(inS){if(ch==='\\')k++;else if(ch===sq)inS=false;}else{if(ch==='"'||ch==="'"){inS=true;sq=ch;}else if(ch==='-'&&line[k+1]==='-'){ci=k;break;}}}if(ci>=0){comment='<span class="lh-cmt">'+hlEsc(line.slice(ci))+'</span>';line=line.slice(0,ci);}return tok(line)+comment;}).join('\n');
  }

  function fmt(iso) { var d = new Date(iso); return d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}); }

  var id = new URLSearchParams(window.location.search).get('id');
  if (!id) {
    document.getElementById('ag-loading').style.display = 'none';
    document.getElementById('ag-error').style.display = 'block';
    return;
  }

  fetch('/api/games?id=' + encodeURIComponent(id))
    .then(function(r) { return r.json(); })
    .then(function(game) {
      document.getElementById('ag-loading').style.display = 'none';
      if (game.error) { document.getElementById('ag-error').style.display = 'block'; return; }

      document.title = game.title;

      // title + desc
      document.getElementById('ag-title').textContent = game.title;
      if (game.desc) {
        var descEl = document.getElementById('ag-desc');
        descEl.textContent = game.desc;
        descEl.style.display = 'block';
      }

      // meta panel
      document.getElementById('ag-author').textContent = game.author;
      document.getElementById('ag-date').textContent = fmt(game.date);
      document.getElementById('ag-id').textContent = id;
      var lines = (game.code || '').split('\n').length;
      document.getElementById('ag-lines').textContent = lines;

      // source with line numbers (wrap each line in a span for preview highlighting)
      var highlighted = highlightLua(game.code || '');
      var hlLines = highlighted.split('\n');
      document.getElementById('ag-source').innerHTML = hlLines.map(function(l, i) {
        return '<span class="ag-src-line" data-line="' + i + '">' + l + '</span>';
      }).join('\n');
      document.getElementById('ag-filename').textContent = id + '.lua';
      var lineCount = (game.code || '').split('\n').length;
      document.getElementById('ag-line-nums').textContent = Array.from({length: lineCount}, function(_, i) { return i + 1; }).join('\n');

      document.getElementById('ag-content').style.display = 'block';

      // play
      document.getElementById('ag-play').addEventListener('click', function() {
        var inner = this.querySelector('.ag-play-btn-inner');
        if (window.termRun) {
          inner.textContent = '▷  launching...';
          var self = this;
          setTimeout(function() { inner.textContent = '▶\u00a0 play in terminal'; }, 1400);
          window.termRun('play ' + id);
          return;
        }
        inner.textContent = 'open [:] → type: play ' + id;
      });

      // remix
      document.getElementById('ag-remix').addEventListener('click', function() {
        window.location.href = '/arcade/?remix=' + encodeURIComponent(id);
      });

      // copy source
      document.getElementById('ag-copy').addEventListener('click', function() {
        var btn = this;
        navigator.clipboard.writeText(game.code || '').then(function() {
          btn.textContent = 'copied!';
          btn.classList.add('copied');
          setTimeout(function() { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1800);
        }).catch(function() {
          btn.textContent = 'failed';
          setTimeout(function() { btn.textContent = 'copy'; }, 1800);
        });
      });

      // preview
      var COLORS = {
        'color.red': '#f7768e', 'color.green': '#9ece6a', 'color.yellow': '#e0af68',
        'color.cyan': '#7dcfff', 'color.blue': '#7aa2f7', 'color.purple': '#bb9af7',
        'color.white': '#c0caf5', 'color.bold': '#c0caf5'
      };

      var previewRunning = false;
      var previewAbort = false;

      function previewCleanup() {
        previewRunning = false;
        previewAbort = false;
        var allLines = document.querySelectorAll('.ag-src-line');
        for (var i = 0; i < allLines.length; i++) {
          allLines[i].classList.remove('ag-line-active');
        }
        var btn = document.getElementById('ag-preview');
        btn.textContent = '\u25b6 preview';
      }

      function previewClose() {
        previewAbort = true;
        document.getElementById('ag-preview-panel').style.display = 'none';
        previewCleanup();
      }

      function evalColoredStr(s) {
        // parse colored("text", color.X) and return {text, color}
        var m = s.match(/^colored\(\s*"([^"]*)"\s*,\s*(color\.\w+)\s*\)$/);
        if (m) return { text: m[1], color: COLORS[m[2]] || null };
        m = s.match(/^colored\(\s*'([^']*)'\s*,\s*(color\.\w+)\s*\)$/);
        if (m) return { text: m[1], color: COLORS[m[2]] || null };
        return null;
      }

      function evalPrintArg(arg) {
        // handle concatenation with ..
        var parts = arg.split('..');
        var result = [];
        for (var i = 0; i < parts.length; i++) {
          var p = parts[i].trim();
          // string literal
          var sm = p.match(/^"([^"]*)"$/) || p.match(/^'([^']*)'$/);
          if (sm) { result.push({ text: sm[1], color: null }); continue; }
          // colored()
          var c = evalColoredStr(p);
          if (c) { result.push(c); continue; }
          // skip variables/expressions - show placeholder
          result.push({ text: '...', color: null });
        }
        return result;
      }

      function parsePrintLine(raw) {
        // match print(...) call
        var m = raw.match(/^\s*print\((.+)\)\s*$/);
        if (!m) return null;
        var inner = m[1].trim();
        // print("") or print('')  -> empty line
        if (inner === '""' || inner === "''") return [];
        return evalPrintArg(inner);
      }

      function isSkipLine(raw) {
        var t = raw.trim();
        if (!t || t.indexOf('--') === 0) return true;
        if (/^\s*(local\s+\w+\s*=\s*)?io\.(read|getkey|choice|confirm)\b/.test(t)) return true;
        if (/^\s*net\./.test(t)) return true;
        if (/^\s*(while|for|repeat)\b/.test(t)) return true;
        if (/^\s*sleep\s*\(/.test(t)) return true;
        if (/^\s*(if|elseif|else|end|do|then|break|return|until)\b/.test(t)) return true;
        if (/^\s*local\s+/.test(t) && !parsePrintLine(t)) return true;
        if (/^\s*sound\./.test(t)) return true;
        if (/^\s*clear\s*\(/.test(t)) return true;
        return false;
      }

      function runPreview() {
        if (previewRunning) { previewClose(); return; }
        previewRunning = true;
        previewAbort = false;
        var btn = document.getElementById('ag-preview');
        btn.textContent = '\u25a0 stop';

        var panel = document.getElementById('ag-preview-panel');
        var outEl = document.getElementById('ag-preview-out');
        panel.style.display = 'block';
        outEl.innerHTML = '';

        var rawLines = (game.code || '').split('\n');
        var srcLines = document.querySelectorAll('.ag-src-line');
        var idx = 0;

        function step() {
          if (previewAbort || idx >= rawLines.length) { previewCleanup(); return; }

          // clear previous highlight
          for (var j = 0; j < srcLines.length; j++) srcLines[j].classList.remove('ag-line-active');

          // highlight current line
          if (srcLines[idx]) {
            srcLines[idx].classList.add('ag-line-active');
            srcLines[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          }

          var raw = rawLines[idx];
          var printed = parsePrintLine(raw);

          if (printed !== null) {
            // it's a print statement
            var div = document.createElement('div');
            if (printed.length === 0) {
              div.innerHTML = '&nbsp;';
            } else {
              for (var p = 0; p < printed.length; p++) {
                var span = document.createElement('span');
                span.textContent = printed[p].text;
                if (printed[p].color) span.style.color = printed[p].color;
                div.appendChild(span);
              }
            }
            outEl.appendChild(div);
            outEl.scrollTop = outEl.scrollHeight;
            idx++;
            setTimeout(step, 300);
          } else if (isSkipLine(raw)) {
            idx++;
            setTimeout(step, 80);
          } else {
            idx++;
            setTimeout(step, 150);
          }
        }

        step();
      }

      document.getElementById('ag-preview').addEventListener('click', runPreview);
      document.getElementById('ag-preview-close').addEventListener('click', previewClose);

      // wire edit-in-editor link
      document.getElementById('ag-edit-link').href = '/arcade/editor/?edit=' + encodeURIComponent(id);

      // delete
      document.getElementById('ag-del-confirm').addEventListener('click', function() {
        var code = document.getElementById('ag-code-inp').value.trim();
        var status = document.getElementById('ag-del-status');
        if (!code) { status.textContent = 'enter your edit code'; return; }
        this.disabled = true; this.textContent = 'deleting...'; status.textContent = '';
        fetch('/api/games?id=' + encodeURIComponent(id), {
          method: 'DELETE', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({code: code})
        }).then(function(r){return r.json();}).then(function(d){
          if (d.ok) { try { localStorage.removeItem('arcade_v1'); } catch(e){} window.location.href = '/arcade/?r=1'; }
          else {
            status.textContent = d.error || 'error';
            document.getElementById('ag-del-confirm').disabled = false;
            document.getElementById('ag-del-confirm').textContent = 'confirm delete';
          }
        }).catch(function(){
          status.textContent = 'network error';
          document.getElementById('ag-del-confirm').disabled = false;
          document.getElementById('ag-del-confirm').textContent = 'confirm delete';
        });
      });
    })
    .catch(function() {
      document.getElementById('ag-loading').style.display = 'none';
      document.getElementById('ag-error').style.display = 'block';
    });
})();
</script>
{{ end }}
