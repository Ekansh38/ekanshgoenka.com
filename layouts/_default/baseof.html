<!DOCTYPE html>
<html lang="en" data-theme="tokyo-night">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="{{ .Kind }} {{ .Section }}">

  <!-- BG EFFECT: remove this line along with the BG EFFECT blocks in style.css and script.js -->
  <canvas id="bg-canvas"></canvas>

  {{ partial "header.html" . }}

  {{ block "main" . }}{{ end }}

  {{ partial "footer.html" . }}

  <div id="spawn-overlay"><div id="spawn-hint"></div></div>

  <div id="term-overlay">
    <div id="term-box">
      <div id="term-bar">
        <span id="term-path">ekansh@site:~</span>
        <button id="term-close">✕</button>
      </div>
      <div id="term-output"></div>
      <div id="term-input-row">
        <span id="term-prompt" class="term-prompt">~$&nbsp;</span>
        <input id="term-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
    </div>
  </div>

  <script>
    /* site params for terminal — injected by Hugo */
    var SITE_LINKS = {
      github:  "{{ .Site.Params.github }}",
      youtube: "{{ .Site.Params.youtube }}",
      itchio:  "{{ .Site.Params.itchio }}"
    };

    /* filesystem — auto-generated by Hugo from content/ */
    var TERMINAL_DATA = {
      '': { type: 'dir' },
      'projects': { type: 'dir' },
      {{ with .Site.GetPage "/projects" }}{{ range .Sections -}}
      {{ $sname := .Name | lower -}}
      {{ printf "projects/%s" $sname | jsonify | safeJS }}: { type: "dir", desc: {{ default "" .Params.summary | jsonify | safeJS }}, stack: {{ default "" .Params.stack | jsonify | safeJS }}, status: {{ default "" .Params.status | jsonify | safeJS }}, url: {{ .RelPermalink | jsonify | safeJS }} },
      {{ range .Pages -}}
      {{ printf "projects/%s/%s" $sname .File.BaseFileName | jsonify | safeJS }}: { type: "file", title: {{ .Title | jsonify | safeJS }}, body: {{ .Plain | jsonify | safeJS }}, date: {{ .Date.Format "2006-01-02" | jsonify | safeJS }}, url: {{ .RelPermalink | jsonify | safeJS }} },
      {{ end }}{{ end }}{{ end }}
      'music': { type: 'dir' },
      {{ with .Site.GetPage "/music" }}{{ range .Pages -}}
      {{ printf "music/%s" .File.BaseFileName | jsonify | safeJS }}: { type: "file", title: {{ .Title | jsonify | safeJS }}, body: {{ .Plain | jsonify | safeJS }}, status: {{ default "" .Params.status | jsonify | safeJS }}, url: {{ .RelPermalink | jsonify | safeJS }} },
      {{ end }}{{ end }}
      'games': { type: 'dir' },
      {{ with .Site.GetPage "/games" }}{{ range .Pages -}}
      {{ printf "games/%s" .File.BaseFileName | jsonify | safeJS }}: { type: "file", title: {{ .Title | jsonify | safeJS }}, body: {{ default "" .Params.summary | jsonify | safeJS }}, engine: {{ default "" .Params.engine | jsonify | safeJS }}, url: {{ default "" .Params.itchio | jsonify | safeJS }} },
      {{ end }}{{ end }}
      'writing': { type: 'dir' },
      {{ with .Site.GetPage "/writing" }}{{ range .Pages -}}
      {{ printf "writing/%s" .File.BaseFileName | jsonify | safeJS }}: { type: "file", title: {{ .Title | jsonify | safeJS }}, body: {{ .Plain | jsonify | safeJS }}, url: {{ .RelPermalink | jsonify | safeJS }} },
      {{ end }}{{ end }}
    };
  </script>

  <div id="preset-picker">
    <button id="preset-picker-btn">:preset</button>
    <div id="preset-picker-menu"></div>
  </div>

  <div id="theme-picker">
    <button id="theme-picker-btn">:colorscheme</button>
    <div id="theme-picker-menu">
      <div class="tp-header">select colorscheme</div>
      <button class="tp-item" data-t="tokyo-night">
        <span class="tp-arrow">▶</span>tokyo-night<span class="tp-variant">dark</span>
      </button>
      <button class="tp-item" data-t="gruvbox">
        <span class="tp-arrow">▶</span>gruvbox<span class="tp-variant">dark</span>
      </button>
      <button class="tp-item" data-t="kanagawa">
        <span class="tp-arrow">▶</span>kanagawa<span class="tp-variant">dark</span>
      </button>
      <button class="tp-item" data-t="flexoki-light">
        <span class="tp-arrow">▶</span>flexoki-light<span class="tp-variant">light</span>
      </button>
      <button class="tp-item" data-t="rose-pine">
        <span class="tp-arrow">▶</span>rose-pine<span class="tp-variant">light</span>
      </button>
      <button class="tp-item" data-t="ayu-light">
        <span class="tp-arrow">▶</span>ayu-light<span class="tp-variant">light</span>
      </button>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
