<!DOCTYPE html>
<html lang="en" data-theme="tokyo-night">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- BG EFFECT: remove this line along with the BG EFFECT blocks in style.css and script.js -->
  <canvas id="bg-canvas"></canvas>

  {{ partial "header.html" . }}

  {{ block "main" . }}{{ end }}

  {{ partial "footer.html" . }}

  <div id="term-overlay">
    <div id="term-box">
      <div id="term-bar">
        <span>ekansh@site:~</span>
        <button id="term-close">✕</button>
      </div>
      <div id="term-output"></div>
      <div id="term-input-row">
        <span class="term-prompt">$&nbsp;</span>
        <input id="term-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
    </div>
  </div>

  <script>
    /* site params for terminal — injected by Hugo */
    var SITE_LINKS = {
      github:  "{{ .Site.Params.github }}",
      youtube: "{{ .Site.Params.youtube }}",
      itchio:  "{{ .Site.Params.itchio }}"
    };

    /* terminal data — auto-generated by Hugo from content/ */
    var TERMINAL_DATA = {
      projects: {
        {{ range .Site.Pages }}{{ if and (eq .Kind "section") (strings.HasPrefix .RelPermalink "/projects/") (ne .RelPermalink "/projects/") -}}
        {{ .Slug | jsonify }}: { desc: {{ default "" .Params.summary | jsonify }}, stack: {{ default "" .Params.stack | jsonify }}, status: {{ default "" .Params.status | jsonify }}, url: {{ .RelPermalink | jsonify }} },
        {{ end }}{{ end }}
      },
      music: {
        {{ range where .Site.RegularPages "Section" "music" -}}
        {{ .Slug | jsonify }}: { desc: {{ default "" .Params.summary | jsonify }}, status: {{ default "" .Params.status | jsonify }}, url: {{ .RelPermalink | jsonify }} },
        {{ end }}
      },
      games: {
        {{ range where .Site.RegularPages "Section" "games" -}}
        {{ .Slug | jsonify }}: { desc: {{ default "" .Params.summary | jsonify }}, engine: {{ default "" .Params.engine | jsonify }}, url: {{ default "" .Params.itchio | jsonify }} },
        {{ end }}
      },
      writing: {
        {{ range where .Site.RegularPages "Section" "writing" -}}
        {{ .Slug | jsonify }}: { desc: {{ default "" .Params.summary | jsonify }}, url: {{ .RelPermalink | jsonify }} },
        {{ end }}
      },
      now: {{ with .Site.GetPage "/now" }}{{ default "" .Params.summary | jsonify }}{{ else }}""{{ end }}
    };
  </script>

  <div id="theme-picker">
    <button id="theme-picker-btn">:colorscheme</button>
    <div id="theme-picker-menu">
      <div class="tp-header">select colorscheme</div>
      <button class="tp-item" data-t="tokyo-night">
        <span class="tp-arrow">▶</span>tokyo-night<span class="tp-variant">dark</span>
      </button>
      <button class="tp-item" data-t="gruvbox">
        <span class="tp-arrow">▶</span>gruvbox<span class="tp-variant">dark</span>
      </button>
      <button class="tp-item" data-t="rose-pine">
        <span class="tp-arrow">▶</span>rose-pine<span class="tp-variant">light</span>
      </button>
      <button class="tp-item" data-t="solarized-light">
        <span class="tp-arrow">▶</span>solarized-light<span class="tp-variant">light</span>
      </button>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
