<!DOCTYPE html>
<html lang="en" data-theme="tokyo-night">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {{ $title := .Site.Title }}
  {{ $desc  := cond (ne .Summary "") .Summary "developer, builder, learner" }}

  <title>{{ $title }}</title>
  <meta name="description" content="{{ $desc }}">

  <meta property="og:type"        content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url"         content="{{ .Permalink }}">
  <meta property="og:title"       content="{{ $title }}">
  <meta property="og:description" content="{{ $desc }}">
  <meta property="og:site_name"   content="{{ .Site.Title }}">

  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="{{ $title }}">
  <meta name="twitter:description" content="{{ $desc }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="{{ .Kind }} {{ .Section }}">

  <!-- BG EFFECT: remove this line along with the BG EFFECT blocks in style.css and script.js -->
  <canvas id="bg-canvas"></canvas>

  {{ partial "header.html" . }}

  {{ block "main" . }}{{ end }}

  {{ partial "footer.html" . }}

  <div id="spawn-overlay"><div id="spawn-hint"></div></div>

  <div id="term-overlay">
    <div id="term-box">
      <div id="term-bar">
        <span id="term-path">ekansh@site:~</span>
        <button id="term-close">✕</button>
      </div>
      <div id="term-output"></div>
      <div id="term-input-row">
        <span id="term-prompt" class="term-prompt">~$&nbsp;</span>
        <input id="term-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
    </div>
  </div>

  <script>
    /* site params for terminal — injected by Hugo */
    var SITE_LINKS = {
      github:  "{{ .Site.Params.github }}",
      youtube: "{{ .Site.Params.youtube }}",
      itchio:  "{{ .Site.Params.itchio }}",
      email:   "{{ .Site.Params.email }}"
    };

    /* filesystem — auto-generated by Hugo from content/ */
    var TERMINAL_DATA = {
      '': { type: 'dir' },
      'contact.txt': { type: 'file', title: 'contact', body: 'ekansh goenka\n\nemail   {{ .Site.Params.email }}\ngithub  {{ .Site.Params.github }}\n\nfeel free to reach out about anything.' },
      'projects': { type: 'dir' },
      {{ with .Site.GetPage "/projects" }}{{ range .Sections -}}
      {{ $sname := .Name | lower -}}
      {{ printf "projects/%s" $sname | jsonify | safeJS }}: { type: "dir", desc: {{ default "" .Params.summary | jsonify | safeJS }}, stack: {{ default "" .Params.stack | jsonify | safeJS }}, status: {{ default "" .Params.status | jsonify | safeJS }}, url: {{ .RelPermalink | jsonify | safeJS }} },
      {{ range .Pages -}}
      {{ printf "projects/%s/%s" $sname .File.BaseFileName | jsonify | safeJS }}: { type: "file", title: {{ .Title | jsonify | safeJS }}, body: {{ .Plain | jsonify | safeJS }}, date: {{ .Date.Format "2006-01-02" | jsonify | safeJS }}, url: {{ .RelPermalink | jsonify | safeJS }} },
      {{ end }}{{ end }}{{ end }}
      'music': { type: 'dir' },
      {{ with .Site.GetPage "/music" }}{{ range .Pages -}}
      {{ printf "music/%s" .File.BaseFileName | jsonify | safeJS }}: { type: "file", title: {{ .Title | jsonify | safeJS }}, body: {{ .Plain | jsonify | safeJS }}, status: {{ default "" .Params.status | jsonify | safeJS }}, url: {{ .RelPermalink | jsonify | safeJS }} },
      {{ end }}{{ end }}
      'games': { type: 'dir' },
      {{ with .Site.GetPage "/games" }}{{ range .Pages -}}
      {{ printf "games/%s" .File.BaseFileName | jsonify | safeJS }}: { type: "file", title: {{ .Title | jsonify | safeJS }}, body: {{ default "" .Params.summary | jsonify | safeJS }}, engine: {{ default "" .Params.engine | jsonify | safeJS }}, url: {{ default "" .Params.itchio | jsonify | safeJS }} },
      {{ end }}{{ end }}
      'writing': { type: 'dir' },
      {{ with .Site.GetPage "/writing" }}{{ range .Pages -}}
      {{ printf "writing/%s" .File.BaseFileName | jsonify | safeJS }}: { type: "file", title: {{ .Title | jsonify | safeJS }}, body: {{ .Plain | jsonify | safeJS }}, url: {{ .RelPermalink | jsonify | safeJS }} },
      {{ end }}{{ end }}
      'tools': { type: 'dir' },
      {{ with .Site.GetPage "/tools" }}{{ range .Pages -}}
      {{ printf "tools/%s" .File.BaseFileName | jsonify | safeJS }}: { type: "file", title: {{ .Title | jsonify | safeJS }}, stack: {{ default "" .Params.stack | jsonify | safeJS }}, status: {{ default "" .Params.status | jsonify | safeJS }}, body: {{ .Plain | jsonify | safeJS }}, url: {{ .RelPermalink | jsonify | safeJS }} },
      {{ end }}{{ end }}
      /* EXPERIENCE — commented out, re-enable when ready
      'experience': { type: 'dir' },
      {{ with .Site.GetPage "/experience" }}{{ range .Pages -}}
      {{ printf "experience/%s" .File.BaseFileName | jsonify | safeJS }}: { type: "file", title: {{ .Title | jsonify | safeJS }}, body: {{ .Plain | jsonify | safeJS }}, stack: {{ default "" .Params.stack | jsonify | safeJS }}, status: {{ printf "%s · %s" (default "" .Params.role) (default "" .Params.year) | jsonify | safeJS }}, url: {{ .RelPermalink | jsonify | safeJS }} },
      {{ end }}{{ end }}
      */
    };
  </script>

  <div id="preset-picker">
    <button id="preset-picker-btn">:preset</button>
    <div id="preset-picker-menu"></div>
  </div>

  <div id="theme-picker">
    <button id="theme-picker-btn">:colorscheme</button>
    <div id="theme-picker-menu">
      <div class="tp-header">select colorscheme</div>
      <button class="tp-item" data-t="tokyo-night">
        <span class="tp-arrow">▶</span>tokyo-night<span class="tp-variant">dark</span>
      </button>
      <button class="tp-item" data-t="gruvbox">
        <span class="tp-arrow">▶</span>gruvbox<span class="tp-variant">dark</span>
      </button>
      <button class="tp-item" data-t="dracula">
        <span class="tp-arrow">▶</span>dracula<span class="tp-variant">dark</span>
      </button>
      <button class="tp-item" data-t="rose-pine">
        <span class="tp-arrow">▶</span>rose-pine<span class="tp-variant">light</span>
      </button>
      <button class="tp-item" data-t="github-light">
        <span class="tp-arrow">▶</span>github-light<span class="tp-variant">light</span>
      </button>
      <button class="tp-item" data-t="papercolor-light">
        <span class="tp-arrow">▶</span>papercolor-light<span class="tp-variant">light</span>
      </button>
    </div>
  </div>

  <div id="copy-toast">copied to clipboard</div>

  <script src="/script.js"></script>
</body>
</html>
