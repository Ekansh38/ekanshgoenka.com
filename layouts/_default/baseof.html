<!DOCTYPE html>
<html lang="en" data-theme="tokyo-night">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- BG EFFECT: remove this line along with the BG EFFECT blocks in style.css and script.js -->
  <canvas id="bg-canvas"></canvas>

  {{ partial "header.html" . }}

  {{ block "main" . }}{{ end }}

  {{ partial "footer.html" . }}

  <div id="term-overlay">
    <div id="term-box">
      <div id="term-bar">
        <span>ekansh@site:~</span>
        <button id="term-close">✕</button>
      </div>
      <div id="term-output"></div>
      <div id="term-input-row">
        <span class="term-prompt">$&nbsp;</span>
        <input id="term-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
    </div>
  </div>

  <script>
    /* site params for terminal — injected by Hugo */
    var SITE_LINKS = {
      github:  "{{ .Site.Params.github }}",
      youtube: "{{ .Site.Params.youtube }}",
      itchio:  "{{ .Site.Params.itchio }}"
    };
  </script>

  <div id="theme-picker">
    <button id="theme-mode-btn" title="toggle light / dark">●</button>
    <button class="tp-dot" data-t="tokyo-night" data-label="tokyo night"></button>
    <button class="tp-dot" data-t="rose-pine"   data-label="rosé pine"></button>
    <button class="tp-dot" data-t="gruvbox"      data-label="gruvbox"></button>
    <button class="tp-dot" data-t="catppuccin"   data-label="catppuccin"></button>
    <button class="tp-dot" data-t="nord"         data-label="nord"></button>
    <button class="tp-dot" data-t="everforest"   data-label="everforest"></button>
  </div>

  <script src="/script.js"></script>
</body>
</html>
