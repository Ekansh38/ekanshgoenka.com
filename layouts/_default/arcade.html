{{ define "main" }}
<h1 style="margin-bottom:6px;">arcade</h1>
<p style="color:var(--muted);margin-bottom:32px;">lua games made by visitors.</p>

<div id="arc-games"><p style="color:var(--muted)">loading...</p></div>

<p style="color:var(--muted);font-weight:700;margin:44px 0 16px;">submit a game</p>
<div class="arc-form">
  <div class="arc-row">
    <input id="arc-title"  type="text" placeholder="game title (unique, becomes the id)" maxlength="50" autocomplete="off" spellcheck="false">
    <input id="arc-author" type="text" placeholder="your name" maxlength="50" autocomplete="off" spellcheck="false">
  </div>
  <input id="arc-desc" type="text" placeholder="short description (optional)" maxlength="200" autocomplete="off" spellcheck="false" style="margin-bottom:10px;">
  <div class="arc-editor">
    <pre class="arc-editor-hl" id="arc-hl" aria-hidden="true"></pre>
    <textarea id="arc-code" placeholder="-- lua code here&#10;print('what is your name?')&#10;local name = io.read()&#10;print('hi ' .. name)" rows="14" spellcheck="false" autocomplete="off"></textarea>
  </div>
  <input id="arc-hp" type="text" tabindex="-1" autocomplete="off" style="display:none">
  <div class="arc-submit-row">
    <button id="arc-test">test in terminal →</button>
    <button id="arc-submit">submit game →</button>
    <span id="arc-status"></span>
  </div>
  <div id="arc-editcode-box" style="display:none;margin-top:16px;padding:12px;border:1px solid var(--accent);font-size:0.88rem;">
    <div style="color:var(--muted);margin-bottom:6px;">edit code (save this):</div>
    <code id="arc-editcode" style="font-size:1rem;letter-spacing:0.05em;color:var(--fg);"></code>
    <div style="color:var(--muted);margin-top:8px;font-size:0.82rem;">to delete: open the game page and scroll to delete, or terminal: <code>delete &lt;id&gt; &lt;code&gt;</code></div>
  </div>
</div>

<p style="color:var(--muted);font-weight:700;margin:44px 0 16px;">lua basics</p>
<pre id="arc-docs-code" class="arc-source-block" style="font-size:0.82rem;line-height:1.7;"></pre>

<script>
(function() {
  var API = '/api/games';
  var LS_KEY = 'arcade_v1', LS_TTL = 5 * 60 * 1000;

  function lsGet() { try { var d = JSON.parse(localStorage.getItem(LS_KEY)); if (d && Date.now() - d.t < LS_TTL) return d.v; } catch(e) {} return null; }
  function lsSet(v) { try { localStorage.setItem(LS_KEY, JSON.stringify({t: Date.now(), v: v})); } catch(e) {} }
  function lsBust() { try { localStorage.removeItem(LS_KEY); } catch(e) {} }

  // lua syntax highlight
  var LUA_KW = /\b(local|function|if|then|else|elseif|end|while|do|for|in|return|break|and|or|not|true|false|nil|repeat|until|math|string|table|print|io|tostring|tonumber|type|pairs|ipairs|pcall|error|select)\b/g;
  function hlEsc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function highlightLua(code) {
    return code.split('\n').map(function(line) {
      var comment = '', ci = -1, inStr = false, sq = '';
      for (var k = 0; k < line.length - 1; k++) {
        if (!inStr && (line[k] === '"' || line[k] === "'")) { inStr = true; sq = line[k]; }
        else if (inStr && line[k] === sq && line[k-1] !== '\\') { inStr = false; }
        else if (!inStr && line[k] === '-' && line[k+1] === '-') { ci = k; break; }
      }
      if (ci >= 0) { comment = '<span class="lh-cmt">' + hlEsc(line.slice(ci)) + '</span>'; line = line.slice(0, ci); }
      var out = '', i = 0;
      while (i < line.length) {
        if (line[i] === '"' || line[i] === "'") {
          var q = line[i], j = i + 1;
          while (j < line.length && line[j] !== q) { if (line[j] === '\\') j++; j++; }
          out += '<span class="lh-str">' + hlEsc(line.slice(i, j + 1)) + '</span>'; i = j + 1;
        } else { out += hlEsc(line[i++]); }
      }
      out = out.replace(LUA_KW, '<span class="lh-kw">$1</span>');
      out = out.replace(/\b(\d+\.?\d*)\b/g, '<span class="lh-num">$1</span>');
      return out + comment;
    }).join('\n');
  }

  // docs
  var DOCS = [
    '-- variables',
    'local x = 5',
    'local name = "ekansh"',
    'local alive = true',
    '',
    '-- output / input',
    'print("hello " .. name)',
    'local answer = io.read("enter something: ")',
    'local n = tonumber(io.read("enter a number: "))',
    '',
    '-- if / else',
    'if x > 3 then',
    '  print("big")',
    'elseif x == 3 then',
    '  print("three")',
    'else',
    '  print("small")',
    'end',
    '',
    '-- while loop',
    'local i = 1',
    'while i <= 5 do',
    '  print(i)',
    '  i = i + 1',
    'end',
    '',
    '-- for loop',
    'for i = 1, 5 do',
    '  print(i)',
    'end',
    '',
    '-- functions',
    'local function greet(name)',
    '  return "hi " .. name',
    'end',
    'print(greet("ekansh"))',
    '',
    '-- math',
    'math.random(1, 10)    -- random int 1-10',
    'math.floor(3.7)       -- 3',
    'math.abs(-5)          -- 5',
    '',
    '-- strings',
    'string.len("hello")   -- 5',
    'string.upper("hi")    -- "HI"',
    'string.rep("ha", 3)   -- "hahaha"',
    '#"hello"              -- 5  (length shorthand)',
    '',
    '-- tables  (arrays start at 1)',
    'local t = {10, 20, 30}',
    'print(t[1])            -- 10',
    'table.insert(t, 40)',
    'print(#t)              -- 4',
  ].join('\n');

  document.getElementById('arc-docs-code').innerHTML = highlightLua(DOCS);

  // render cards
  function fmt(iso) { var d = new Date(iso); return d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function render(games) {
    var el = document.getElementById('arc-games');
    if (!games.length) { el.innerHTML = '<p style="color:var(--muted)">no games yet. submit one below.</p>'; return; }
    el.innerHTML = games.map(function(g) {
      return '<a class="arc-card" href="/arcade/game/?id=' + esc(g.id) + '">'
        + '<div class="arc-card-header">'
        + '<span class="arc-card-title">' + esc(g.title) + '</span>'
        + '<span class="arc-card-meta">by ' + esc(g.author) + ' · ' + fmt(g.date) + '</span>'
        + '</div>'
        + (g.desc ? '<div class="arc-card-desc">' + esc(g.desc) + '</div>' : '')
        + '</a>';
    }).join('');
  }

  function load(force) {
    if (!force) { var c = lsGet(); if (c) { render(c); return; } }
    fetch(API).then(function(r){return r.json();}).then(function(data){ lsSet(data); render(data); })
      .catch(function(){ document.getElementById('arc-games').innerHTML = '<p style="color:var(--muted)">couldn\'t load games.</p>'; });
  }
  load();

  // textarea editor
  var ta = document.getElementById('arc-code');
  var hl = document.getElementById('arc-hl');

  function setCode(code) { ta.value = code; updateHl(); ta.focus(); }
  function updateHl() { hl.innerHTML = highlightLua(ta.value) + '\n'; hl.scrollTop = ta.scrollTop; }
  ta.addEventListener('input', updateHl);
  ta.addEventListener('scroll', function() { hl.scrollTop = ta.scrollTop; });
  updateHl();

  ta.addEventListener('keydown', function(e) {
    var start = ta.selectionStart, end = ta.selectionEnd, val = ta.value;
    if (e.key === 'Tab') {
      e.preventDefault();
      ta.value = val.slice(0, start) + '  ' + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + 2;
      updateHl(); return;
    }
    if (e.key === 'Enter') {
      var lineStart = val.lastIndexOf('\n', start - 1) + 1;
      var indent = val.slice(lineStart, start).match(/^(\s*)/)[1];
      if (/\b(then|do|else|function)\s*$/.test(val.slice(lineStart, start).trim())) indent += '  ';
      e.preventDefault();
      ta.value = val.slice(0, start) + '\n' + indent + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + 1 + indent.length;
      updateHl(); return;
    }
    var pairs = {'(':')', '[':']', '"':'"', "'":"'"};
    if (pairs[e.key] && start === end) {
      e.preventDefault();
      ta.value = val.slice(0, start) + e.key + pairs[e.key] + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + 1;
      updateHl();
    }
  });

  // remix prefill from URL param
  var remixId = new URLSearchParams(window.location.search).get('remix');
  if (remixId) {
    document.getElementById('arc-title').value = 'remix-' + remixId.slice(0, 20);
    fetch(API + '?id=' + encodeURIComponent(remixId)).then(function(r){return r.json();}).then(function(d){
      setCode(d.code || '');
      document.getElementById('arc-title').scrollIntoView({behavior:'smooth'});
    });
  }

  // test button
  document.getElementById('arc-test').addEventListener('click', function() {
    var code = ta.value.trim();
    if (!code) { document.getElementById('arc-status').textContent = 'write some code first.'; return; }
    if (window.termRunLua) { window.termRunLua(code); }
    else { document.getElementById('arc-status').textContent = 'open [:] first.'; }
  });

  // submit
  document.getElementById('arc-submit').addEventListener('click', function() {
    var title  = document.getElementById('arc-title').value.trim();
    var author = document.getElementById('arc-author').value.trim();
    var desc   = document.getElementById('arc-desc').value.trim();
    var code   = ta.value.trim();
    var hp     = document.getElementById('arc-hp').value;
    var status = document.getElementById('arc-status');
    var btn    = document.getElementById('arc-submit');
    if (!title || !author || !code) { status.textContent = 'title, name, and code required.'; status.style.color = 'var(--muted)'; return; }
    btn.disabled = true; btn.textContent = 'submitting...'; status.textContent = '';
    fetch(API, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({title:title, author:author, desc:desc, code:code, hp:hp}) })
    .then(function(r){return r.json();})
    .then(function(data) {
      if (data.ok) {
        document.getElementById('arc-title').value = '';
        document.getElementById('arc-author').value = '';
        document.getElementById('arc-desc').value = '';
        setCode('');
        status.textContent = 'submitted! play it: play ' + data.id;
        status.style.color = 'var(--accent)';
        document.getElementById('arc-editcode').textContent = data.editCode;
        document.getElementById('arc-editcode-box').style.display = 'block';
        lsBust(); load(true);
      } else { status.textContent = data.error || 'something went wrong.'; status.style.color = 'var(--muted)'; }
    })
    .catch(function(){ status.textContent = 'network error.'; status.style.color = 'var(--muted)'; })
    .finally(function(){ btn.disabled = false; btn.textContent = 'submit game →'; });
  });
})();
</script>
{{ end }}
