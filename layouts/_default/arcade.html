{{ define "main" }}
<style>
  body { max-width: min(900px, 92vw) !important; }
</style>

<div class="arc-bg-dots" aria-hidden="true"></div>

<div class="arc-banner">
  <span class="arc-banner-tag">ekanshgoenka.com / arcade</span>
  <h1 class="arc-title-big" data-text="ARCADE">ARCADE</h1>
  <p class="arc-banner-tagline">visitor-submitted lua games that run in the terminal</p>
  <div class="arc-stat-line" id="arc-stat-line"></div>
</div>

<div id="arc-games"><div class="arc-loading-state">fetching games...</div></div>

<a href="/arcade/editor/" class="arc-editor-cta">
  <span class="arc-editor-cta-label">write a game</span>
  <span class="arc-editor-cta-sub">vim · syntax highlighting · run &amp; submit in one place →</span>
</a>

<details class="arc-docs-details">
  <summary class="arc-section-header arc-docs-summary">snippets</summary>
  <div id="arc-snippets" class="arc-snippets"></div>
</details>

<details class="arc-docs-details">
  <summary class="arc-section-header arc-docs-summary">lua reference</summary>
  <pre id="arc-docs-code" class="arc-source-block" style="font-size:0.82rem;line-height:1.7;"></pre>
</details>

<script>
(function() {
  var API = '/api/games';
  var LS_KEY = 'arcade_v1', LS_TTL = 5 * 60 * 1000;
  var MAX_CODE = 25000;

  function lsGet() { try { var d = JSON.parse(localStorage.getItem(LS_KEY)); if (d && Date.now() - d.t < LS_TTL) return d.v; } catch(e) {} return null; }
  function lsSet(v) { try { localStorage.setItem(LS_KEY, JSON.stringify({t: Date.now(), v: v})); } catch(e) {} }
  function lsBust() { try { localStorage.removeItem(LS_KEY); } catch(e) {} }

  // lua syntax highlight — rich tokenizer
  function hlEsc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function highlightLua(code) {
    var KW_CTL    = /^(if|then|else|elseif|end|while|do|for|in|return|break|repeat|until)$/;
    var KW_DEF    = /^(local|function)$/;
    var KW_VAL    = /^(true|false|nil)$/;
    var KW_OP     = /^(and|or|not)$/;
    var FN_STD    = /^(math|string|table|io|os|coroutine)$/;
    var FN_BLT    = /^(print|tostring|tonumber|type|pairs|ipairs|pcall|xpcall|error|select|assert|next|rawget|rawset|setmetatable|getmetatable)$/;
    var FN_ARC    = /^(sleep|clear|colored|color|sound|net)$/;
    var MOPS      = ['~=','<=','>=','==','..','//'];

    function tok(src) {
      var out = '', i = 0;
      while (i < src.length) {
        var c = src[i];
        // strings
        if (c === '"' || c === "'") {
          var j = i + 1;
          while (j < src.length) { if (src[j] === '\\') { j += 2; } else if (src[j] === c) { j++; break; } else { j++; } }
          out += '<span class="lh-str">' + hlEsc(src.slice(i, j)) + '</span>'; i = j; continue;
        }
        // numbers
        if (/[0-9]/.test(c) || (c === '.' && /[0-9]/.test(src[i+1]||''))) {
          var j = i;
          if (src[j]==='0' && /[xX]/.test(src[j+1]||'')) { j+=2; while(/[0-9a-fA-F]/.test(src[j]||''))j++; }
          else { while(/[0-9]/.test(src[j]||''))j++; if(src[j]==='.'){ j++; while(/[0-9]/.test(src[j]||''))j++; } if(/[eE]/.test(src[j]||'')){ j++; if(/[+-]/.test(src[j]||''))j++; while(/[0-9]/.test(src[j]||''))j++; } }
          out += '<span class="lh-num">' + hlEsc(src.slice(i,j)) + '</span>'; i = j; continue;
        }
        // identifiers
        if (/[a-zA-Z_]/.test(c)) {
          var j = i; while(/[a-zA-Z0-9_]/.test(src[j]||''))j++;
          var w = src.slice(i,j);
          var rest = src.slice(j).replace(/^[ \t]*/,'');
          var call = rest[0]==='(' || rest[0]==='{' || rest[0]==='"' || rest[0]==="'";
          var cls = KW_CTL.test(w)?'lh-kw': KW_DEF.test(w)?'lh-kw2': KW_VAL.test(w)?'lh-val': KW_OP.test(w)?'lh-op': FN_ARC.test(w)?'lh-arcade': FN_STD.test(w)?'lh-std': (FN_BLT.test(w)&&call)?'lh-builtin': call?'lh-fn': null;
          out += cls ? '<span class="'+cls+'">'+hlEsc(w)+'</span>' : hlEsc(w); i = j; continue;
        }
        // operators
        if (/[+\-*\/%^#&|~<>=]/.test(c)) {
          var m = ''; for(var o=0;o<MOPS.length;o++){if(src.slice(i,i+MOPS[o].length)===MOPS[o]){m=MOPS[o];break;}} if(!m)m=c;
          out += '<span class="lh-op">'+hlEsc(m)+'</span>'; i+=m.length; continue;
        }
        out += hlEsc(c); i++;
      }
      return out;
    }

    return code.split('\n').map(function(line) {
      // strip trailing comment (respecting strings)
      var comment='', ci=-1, inS=false, sq='';
      for(var k=0;k<line.length;k++){var ch=line[k]; if(inS){if(ch==='\\')k++;else if(ch===sq)inS=false;}else{if(ch==='"'||ch==="'"){inS=true;sq=ch;}else if(ch==='-'&&line[k+1]==='-'){ci=k;break;}}}
      if(ci>=0){comment='<span class="lh-cmt">'+hlEsc(line.slice(ci))+'</span>';line=line.slice(0,ci);}
      return tok(line)+comment;
    }).join('\n');
  }

  // docs
  var DOCS = [
    '-- output',
    'print("hello")              -- print with newline',
    'io.write("no newline ")     -- print without newline',
    'io.write("still same line\\n")  -- \\n flushes',
    '',
    '-- input',
    'local name = io.read("your name: ")   -- shows prompt, waits',
    'local n    = tonumber(io.read("num: "))  -- convert to number',
    '',
    '-- variables & types',
    'local x = 5',
    'local s = "text"',
    'local b = true',
    '',
    '-- if / else',
    'if x > 3 then print("big")',
    'elseif x == 3 then print("three")',
    'else print("small") end',
    '',
    '-- loops',
    'for i = 1, 5 do print(i) end',
    '',
    'local i = 1',
    'while i <= 5 do print(i); i = i + 1 end',
    '',
    '-- functions',
    'local function greet(name)',
    '  return "hi " .. name  -- .. is string concat',
    'end',
    'print(greet("alice"))   -- hi alice',
    '',
    '-- strings',
    '-- # is the length operator',
    'local s = "hello"',
    'print(#s)                  -- 5',
    'print(string.upper(s))     -- HELLO',
    'print(string.rep("ab", 3)) -- ababab   (repeat)',
    'print(string.rep(" ", 10)) -- 10 spaces',
    '',
    '-- padding / alignment trick',
    'local function pad(s, w) return s .. string.rep(" ", w - #s) end',
    'print(pad("alice", 12) .. "1500")',
    'print(pad("bob",   12) .. "980")',
    '',
    '-- tables (arrays start at 1)',
    'local t = {10, 20, 30}',
    'print(t[1])           -- 10',
    'table.insert(t, 40)',
    '',
    '-- ipairs: iterate array in order (index, value)',
    'for i, v in ipairs(t) do',
    '  print(i, v)         -- 1  10 / 2  20 / ...',
    'end',
    '',
    '-- pairs: iterate any table (key, value, any order)',
    'local scores = {alice=1500, bob=980}',
    'for name, score in pairs(scores) do',
    '  print(name .. ": " .. score)',
    'end',
    '',
    '-- math',
    'math.random(1, 10)   -- random int 1-10',
    'math.floor(3.7)      -- 3',
    'math.abs(-5)         -- 5',
    '',
    '-- color  (wrap text in ANSI color)',
    'print(colored("red text!", color.red))',
    'print(colored("bold",      color.bold))',
    'print(color.cyan .. "raw cyan" .. color.reset)',
    '-- color.red  .green  .yellow  .blue  .purple  .cyan  .white  .bold',
    '',
    '-- sound',
    'sound.beep(440, 0.2)  -- freq Hz, duration sec',
    'sound.blip()           -- short blip',
    'sound.win()            -- win jingle',
    'sound.lose()           -- lose sound',
    'sound.click()          -- UI click',
    'sound.coin()           -- coin pickup',
    '',
    '-- clear & sleep (for animations)',
    'clear()               -- wipe terminal output',
    'sleep(500)            -- pause 500ms',
    '',
    '-- net: persistent storage + leaderboard (scoped to this game)',
    '-- all keys are namespaced — games cannot read each other\'s data',
    'net.set("hi_alice", 1500)         -- store any string/number',
    'local v = net.get("hi_alice")     -- "1500" or "" if not found',
    '',
    'net.rank("alice", 1500)           -- submit to leaderboard',
    'local top = net.top(10)           -- [{name, score}, ...]',
    'for i, e in ipairs(top) do',
    '  print(i .. ". " .. e.name .. "  " .. e.score)',
    'end',
  ].join('\n');

  document.getElementById('arc-docs-code').innerHTML = highlightLua(DOCS);

  // snippets
  var SNIPPETS = [
    {
      title: 'animation loop',
      code: [
        'for i = 1, 5 do',
        '  clear()',
        '  print(colored("frame " .. i, color.cyan))',
        '  sleep(300)',
        'end',
      ].join('\n'),
    },
    {
      title: 'leaderboard',
      code: [
        'local name = io.read("your name: ")',
        'net.rank(name, score)',
        '',
        'for i, e in ipairs(net.top(5)) do',
        '  local r = string.rep(" ", 2 - #tostring(i)) .. i .. "."',
        '  local n = e.name .. string.rep(" ", math.max(0, 14 - #e.name))',
        '  print(colored(r .. " ", color.blue) .. n .. colored(tostring(e.score), color.yellow))',
        'end',
      ].join('\n'),
    },
    {
      title: 'shared counter',
      code: [
        'local count = (tonumber(net.get("plays")) or 0) + 1',
        'net.set("plays", count)',
        'print("played " .. count .. " times total")',
      ].join('\n'),
    },
  ];

  (function() {
    var el = document.getElementById('arc-snippets');
    el.innerHTML = SNIPPETS.map(function(s, idx) {
      return '<div class="arc-snippet">'
        + '<div class="arc-snippet-header">'
        + '<span class="arc-snippet-title">' + s.title + '</span>'
        + '<button class="ag-copy-btn arc-snippet-copy" data-idx="' + idx + '">copy</button>'
        + '</div>'
        + '<pre class="arc-source-block arc-snippet-code" style="margin:0;font-size:0.82rem;line-height:1.7">'
        + highlightLua(s.code) + '</pre>'
        + '</div>';
    }).join('');

    el.addEventListener('click', function(e) {
      var btn = e.target.closest('.arc-snippet-copy');
      if (!btn) return;
      var code = SNIPPETS[parseInt(btn.getAttribute('data-idx'))].code;
      navigator.clipboard.writeText(code).then(function() {
        btn.textContent = 'copied!'; btn.classList.add('copied');
        setTimeout(function() { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1800);
      }).catch(function() { btn.textContent = 'failed'; setTimeout(function() { btn.textContent = 'copy'; }, 1800); });
    });
  })();

  // animated counter
  function animateCount(el, target, suffix) {
    var dur = 500, t0 = performance.now();
    function tick() {
      var p = Math.min((performance.now() - t0) / dur, 1);
      var ease = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(ease * target) + suffix;
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function fmt(iso) { var d = new Date(iso); return d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function render(games) {
    var gamesEl = document.getElementById('arc-games');
    var statEl  = document.getElementById('arc-stat-line');

    if (!games.length) {
      if (statEl) statEl.innerHTML = '';
      gamesEl.innerHTML = '<p style="color:var(--muted);padding:20px 0">no games yet. submit one below.</p>';
      return;
    }

    if (statEl) {
      var countSpan = document.createElement('span');
      countSpan.className = 'arc-stat-val';
      countSpan.textContent = '0';
      var suffix = ' game' + (games.length !== 1 ? 's' : '');
      statEl.innerHTML = '';
      statEl.appendChild(countSpan);
      animateCount(countSpan, games.length, suffix);
    }

    gamesEl.innerHTML = games.map(function(g, i) {
      return '<a class="arc-card" href="/arcade/game/?id=' + esc(g.id) + '" style="animation-delay:' + (i * 0.045) + 's">'
        + '<span class="arc-card-num">' + String(i + 1).padStart(2, '0') + '</span>'
        + '<div class="arc-card-body">'
        + '<span class="arc-card-title">' + esc(g.title) + '</span>'
        + '<span class="arc-card-meta">by ' + esc(g.author) + ' &middot; ' + fmt(g.date) + '</span>'
        + (g.desc ? '<span class="arc-card-desc">' + esc(g.desc) + '</span>' : '')
        + '</div>'
        + '</a>';
    }).join('');
  }

  function load(force) {
    if (!force) { var c = lsGet(); if (c) { render(c); return; } }
    fetch(API).then(function(r){return r.json();}).then(function(data){ lsSet(data); render(data); })
      .catch(function(){ document.getElementById('arc-games').innerHTML = '<p style="color:var(--muted)">couldn\'t load games.</p>'; });
  }
  load();

  // textarea editor with line numbers
  var ta      = document.getElementById('arc-code');
  var hl      = document.getElementById('arc-hl');
  var numsEl  = document.getElementById('arc-editor-nums');
  var charCount = document.getElementById('arc-char-count');
  var lastLineCount = 1;

  function updateNums() {
    var n = Math.max(1, ta.value.split('\n').length);
    if (n === lastLineCount) return;
    lastLineCount = n;
    numsEl.textContent = Array.from({length: n}, function(_, i) { return i + 1; }).join('\n');
  }

  function setCode(code) { ta.value = code; updateHl(); ta.focus(); }
  function updateHl() {
    // auto-grow: textarea height = its scroll content height
    ta.style.height = '0';
    ta.style.height = ta.scrollHeight + 'px';
    hl.innerHTML = highlightLua(ta.value) + '\n';
    updateNums();
    var c = ta.value.length;
    charCount.textContent = c + ' / ' + MAX_CODE;
    charCount.className = 'arc-char-count' + (c > MAX_CODE ? ' arc-char-over' : c > MAX_CODE * 0.85 ? ' arc-char-warn' : '');
  }
  ta.addEventListener('input', updateHl);
  updateHl();

  ta.addEventListener('keydown', function(e) {
    var start = ta.selectionStart, end = ta.selectionEnd, val = ta.value;

    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('arc-submit').click();
      return;
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      ta.value = val.slice(0, start) + '  ' + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + 2;
      updateHl(); return;
    }
    if (e.key === 'Enter') {
      var lineStart = val.lastIndexOf('\n', start - 1) + 1;
      var indent = val.slice(lineStart, start).match(/^(\s*)/)[1];
      if (/\b(then|do|else|function)\s*$/.test(val.slice(lineStart, start).trim())) indent += '  ';
      e.preventDefault();
      ta.value = val.slice(0, start) + '\n' + indent + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + 1 + indent.length;
      updateHl(); return;
    }
    var pairs = {'(':')', '[':']', '"':'"', "'":"'"};
    if (pairs[e.key] && start === end) {
      e.preventDefault();
      ta.value = val.slice(0, start) + e.key + pairs[e.key] + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + 1;
      updateHl();
    }
  });

  // slug preview
  function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,28)||''; }
  var slugPreview = document.getElementById('arc-slug-preview');
  document.getElementById('arc-title').addEventListener('input', function() {
    var slug = slugify(this.value);
    if (slug) { slugPreview.textContent = 'id: ' + slug; slugPreview.style.display = 'block'; }
    else { slugPreview.style.display = 'none'; }
  });

  // edit code copy button
  document.getElementById('arc-editcode-copy').addEventListener('click', function() {
    var btn = this;
    var code = document.getElementById('arc-editcode').textContent;
    navigator.clipboard.writeText(code).then(function() {
      btn.textContent = 'copied!'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1800);
    });
  });

  // remix prefill
  var remixId = new URLSearchParams(window.location.search).get('remix');
  if (remixId) {
    document.getElementById('arc-title').value = 'remix-' + remixId.slice(0, 20);
    fetch(API + '?id=' + encodeURIComponent(remixId)).then(function(r){return r.json();}).then(function(d){
      setCode(d.code || '');
      document.getElementById('arc-title').scrollIntoView({behavior:'smooth'});
    });
  }

  // test button
  document.getElementById('arc-test').addEventListener('click', function() {
    var code = ta.value.trim();
    if (!code) { document.getElementById('arc-status').textContent = 'write some code first.'; return; }
    if (window.termRunLua) { window.termRunLua(code); }
    else { document.getElementById('arc-status').textContent = 'open [:] first.'; }
  });

  // submit
  document.getElementById('arc-submit').addEventListener('click', function() {
    var title  = document.getElementById('arc-title').value.trim();
    var author = document.getElementById('arc-author').value.trim();
    var desc   = document.getElementById('arc-desc').value.trim();
    var code   = ta.value.trim();
    var hp     = document.getElementById('arc-hp').value;
    var status = document.getElementById('arc-status');
    var btn    = document.getElementById('arc-submit');
    if (!title || !author || !code) { status.textContent = 'title, name, and code required.'; status.style.color = 'var(--code-err)'; return; }

    btn.disabled = true; btn.textContent = 'checking...'; status.textContent = '';

    function doSubmit() {
      btn.textContent = 'submitting...';
      fetch(API, { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({title:title, author:author, desc:desc, code:code, hp:hp}) })
      .then(function(r){return r.json();})
      .then(function(data) {
        if (data.ok) {
          document.getElementById('arc-title').value = '';
          document.getElementById('arc-author').value = '';
          document.getElementById('arc-desc').value = '';
          setCode('');
          status.textContent = 'submitted! play: play ' + data.id;
          status.style.color = 'var(--accent)';
          document.getElementById('arc-editcode').textContent = data.editCode;
          document.getElementById('arc-editcode-box').style.display = 'block';
          lsBust(); load(true);
        } else { status.textContent = data.error || 'something went wrong.'; status.style.color = 'var(--code-err)'; }
      })
      .catch(function(){ status.textContent = 'network error.'; status.style.color = 'var(--code-err)'; })
      .finally(function(){ btn.disabled = false; btn.textContent = 'submit game →'; });
    }

    if (window.luaCheck) {
      window.luaCheck(code, function(err) {
        if (err) {
          status.textContent = err;
          status.style.color = '#f7768e';
          btn.disabled = false; btn.textContent = 'submit game →';
        } else { doSubmit(); }
      });
    } else { doSubmit(); }
  });
})();
</script>
{{ end }}
